<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Billy's 1:1 Scoring | B&G</title>
<style>
:root {
  --bg: #0A0E14;
  --bg-card: #111820;
  --gold: #C8A951;
  --cream: #FBF8F3;
  --cream-dim: rgba(251,248,243,0.4);
  --green: #2ECC71;
  --red: #E74C3C;
  --orange: #F39C12;
  --border: rgba(251,248,243,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
}
h1 { font-size: 1.3em; margin-bottom: 4px; }
.sub { color: var(--cream-dim); font-size: 0.85em; margin-bottom: 20px; }

.person-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}
.person-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.person-header h2 { font-size: 1.1em; }
.person-header .total {
  font-size: 1.6em;
  font-weight: 700;
}

.score-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.score-label {
  font-size: 0.75em;
  color: var(--cream-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.score-buttons {
  display: flex;
  gap: 6px;
}
.score-btn {
  flex: 1;
  height: 52px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--cream-dim);
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.score-btn.active {
  border-color: var(--gold);
  background: var(--gold);
  color: var(--bg);
}

.verdict-section {
  padding: 14px 16px;
  display: flex;
  gap: 8px;
}
.verdict-btn {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: transparent;
  font-size: 0.9em;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
}
.verdict-btn.yes { color: var(--green); }
.verdict-btn.yes.active { border-color: var(--green); background: rgba(46,204,113,0.15); }
.verdict-btn.lean-yes { color: var(--gold); }
.verdict-btn.lean-yes.active { border-color: var(--gold); background: rgba(200,169,81,0.15); }
.verdict-btn.maybe { color: var(--orange); }
.verdict-btn.maybe.active { border-color: var(--orange); background: rgba(243,156,18,0.15); }
.verdict-btn.no { color: var(--red); }
.verdict-btn.no.active { border-color: var(--red); background: rgba(231,76,60,0.15); }

.note-row {
  padding: 10px 16px 14px;
  display: flex;
  gap: 8px;
}
.note-input {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  color: var(--cream);
  font-size: 16px;
  outline: none;
}
.note-btn {
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-weight: 700;
  cursor: pointer;
}
.empty { text-align: center; padding: 40px; color: var(--cream-dim); }
</style>
</head>
<body>

<h1>🎯 Billy's 1:1 Scoring</h1>
<div class="sub">Tap to score during the mock mentor call. Keep it simple.</div>

<div id="cards"></div>

<script>
const BILLY_DIMS = [
  { id: 'first15', label: 'First Impression (energy in first 15 sec)', emoji: '⚡' },
  { id: 'conversation', label: 'Could Hold a Conversation', emoji: '💬' },
  { id: 'curiosity', label: 'Asked Questions / Showed Curiosity', emoji: '🔍' },
  { id: 'vibe', label: 'Would I Actually Want This Guy as MY Mentor?', emoji: '🤝' },
];

const STORAGE_KEY = 'bg-mentor-pipeline';
let mentors = [];
let stageAssignments = {};
let mentorScores = {};
let mentorNotes = {};

function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    stageAssignments = d.stageAssignments || {};
    mentorScores = d.mentorScores || {};
    mentorNotes = d.mentorNotes || {};
  } catch {}
}

function saveLocal() {
  const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  d.mentorScores = mentorScores;
  d.mentorNotes = mentorNotes;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

async function init() {
  loadLocal();
  try {
    const resp = await fetch('../data/mentor-applicants.json');
    const data = await resp.json();
    mentors = data.mentors;
  } catch (e) { console.error(e); }
  render();
}

function getBillyQueue() {
  return mentors.filter(m => {
    const stage = stageAssignments[m.id] || m.stage;
    return stage === 'billy' || stage === 'interview';
  });
}

function render() {
  const queue = getBillyQueue();
  if (!queue.length) {
    document.getElementById('cards').innerHTML = '<div class="empty">No one in your queue yet.<br>They\'ll appear here when Harry moves them to your stage.</div>';
    return;
  }
  
  document.getElementById('cards').innerHTML = queue.map(m => {
    const scores = mentorScores[m.id]?.billyDims || {};
    const verdict = mentorScores[m.id]?.billyVerdict || '';
    const total = BILLY_DIMS.reduce((s, d) => s + (scores[d.id] || 0), 0);
    const notes = mentorNotes[m.id] || [];
    const billyNotes = notes.filter(n => n.author === 'Billy');
    
    return `
      <div class="person-card">
        <div class="person-header">
          <h2>${esc(m.name)}</h2>
          <div class="total" style="color:${total>=16?'var(--green)':total>=12?'var(--gold)':total>=8?'var(--orange)':'var(--cream-dim)'}">
            ${total||'—'}<span style="font-size:0.5em;color:var(--cream-dim)">/20</span>
          </div>
        </div>
        
        ${BILLY_DIMS.map(dim => `
          <div class="score-section">
            <div class="score-label">${dim.emoji} ${dim.label}</div>
            <div class="score-buttons">
              ${[1,2,3,4,5].map(n => `
                <button class="score-btn ${(scores[dim.id]||0)===n?'active':''}" 
                  onclick="setBillyDim('${m.id}','${dim.id}',${n})">${n}</button>
              `).join('')}
            </div>
          </div>
        `).join('')}
        
        <div class="score-section">
          <div class="score-label">🏆 Would you hire this person?</div>
          <div class="verdict-section" style="padding:0;">
            <button class="verdict-btn yes ${verdict==='yes'?'active':''}" onclick="setBillyVerdict('${m.id}','yes')">Yes</button>
            <button class="verdict-btn maybe ${verdict==='leaning-yes'?'active':''}" style="color:var(--gold);" onclick="setBillyVerdict('${m.id}','leaning-yes')">Leaning Yes</button>
            <button class="verdict-btn maybe ${verdict==='leaning-no'?'active':''}" onclick="setBillyVerdict('${m.id}','leaning-no')">Leaning No</button>
            <button class="verdict-btn no ${verdict==='no'?'active':''}" onclick="setBillyVerdict('${m.id}','no')">No</button>
          </div>
        </div>
        
        <div class="note-row">
          <input class="note-input" id="bnote-${m.id}" placeholder="Quick note...">
          <button class="note-btn" onclick="addBillyNote('${m.id}')">+</button>
        </div>
        ${billyNotes.length ? `<div style="padding:0 16px 12px;">
          ${billyNotes.slice(-2).map(n => `<div style="font-size:0.8em;color:var(--cream-dim);">${esc(n.text)}</div>`).join('')}
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function setBillyDim(mentorId, dimId, score) {
  if (!mentorScores[mentorId]) mentorScores[mentorId] = {};
  if (!mentorScores[mentorId].billyDims) mentorScores[mentorId].billyDims = {};
  mentorScores[mentorId].billyDims[dimId] = score;
  // Also set total billy score for the main dashboard
  const dims = mentorScores[mentorId].billyDims;
  mentorScores[mentorId].billy = Object.values(dims).reduce((s,v) => s+v, 0);
  saveLocal();
  render();
}

function setBillyVerdict(mentorId, verdict) {
  if (!mentorScores[mentorId]) mentorScores[mentorId] = {};
  mentorScores[mentorId].billyVerdict = verdict;
  saveLocal();
  render();
}

function addBillyNote(mentorId) {
  const input = document.getElementById(`bnote-${mentorId}`);
  const text = input?.value.trim();
  if (!text) return;
  if (!mentorNotes[mentorId]) mentorNotes[mentorId] = [];
  mentorNotes[mentorId].push({ author: 'Billy', text, date: new Date().toISOString() });
  saveLocal();
  render();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
