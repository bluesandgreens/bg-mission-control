<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blues &amp; Greens — Daily Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --dark-bg: #101318;
  --deep-navy: #0A2E5C;
  --brand-navy: #104791;
  --warm-gold: #C8A951;
  --white: #FFFFFF;
  --red-alert: #E74C3C;
  --green-on: #27AE60;
  --card-border: 1px solid rgba(16, 71, 145, 0.25);
  --card-bg: linear-gradient(135deg, rgba(10, 46, 92, 0.6) 0%, rgba(16, 19, 24, 0.8) 100%);
  --gold-glow: 0 0 40px rgba(200, 169, 81, 0.45);
  --text-muted: rgba(255,255,255,0.5);
  --text-dim: rgba(255,255,255,0.35);
  --border-subtle: rgba(255,255,255,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--dark-bg);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  line-height: 1.5;
  min-height: 100vh;
}

h1, h2, h3, .metric-value { font-family: 'Archivo Black', sans-serif; }

.container { max-width: 1280px; margin: 0 auto; padding: 0 20px 60px; }

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 28px 0; border-bottom: 1px solid rgba(200, 169, 81, 0.2);
  flex-wrap: wrap; gap: 16px;
}
.header-title {
  font-family: 'Archivo Black', sans-serif; font-size: 26px;
  color: var(--warm-gold); letter-spacing: 1px;
}
.header-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.header-right { text-align: right; display: flex; align-items: center; gap: 16px; }
.header-date { font-size: 14px; color: var(--warm-gold); font-weight: 600; }
.header-updated { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.refresh-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid rgba(200, 169, 81, 0.4);
  background: transparent; color: var(--warm-gold); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.refresh-btn:hover { background: rgba(200, 169, 81, 0.15); box-shadow: var(--gold-glow); }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* Sections */
.section { margin-top: 36px; }
.section-header {
  display: flex; align-items: center; padding: 12px 16px;
  border-left: 4px solid var(--warm-gold);
  background: linear-gradient(90deg, rgba(10, 46, 92, 0.4) 0%, transparent 100%);
  border-radius: 0 8px 8px 0; margin-bottom: 16px;
}
.section-header h2 {
  font-family: 'Archivo Black', sans-serif; font-size: 13px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--warm-gold);
}

/* Stat Cards */
.stats-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;
}
.stat-card {
  background: var(--card-bg); border: var(--card-border); border-radius: 16px;
  padding: 20px 16px; position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--warm-gold), transparent);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--gold-glow); }
.stat-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); margin-bottom: 8px;
}
.metric-value { font-size: 32px; color: var(--warm-gold); line-height: 1; }
.metric-value.red { color: var(--red-alert); }
.metric-value.green { color: var(--green-on); }
.metric-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

/* Funnel */
.funnel { display: flex; gap: 0; align-items: stretch; margin-top: 4px; }
.funnel-stage {
  flex: 1; text-align: center; padding: 20px 12px; position: relative;
  background: var(--card-bg); border: var(--card-border);
  transition: transform 0.2s;
}
.funnel-stage:first-child { border-radius: 16px 0 0 16px; }
.funnel-stage:last-child { border-radius: 0 16px 16px 0; }
.funnel-stage:hover { transform: translateY(-2px); }
.funnel-stage .stage-count {
  font-family: 'Archivo Black', sans-serif; font-size: 28px;
  color: var(--warm-gold); display: block;
}
.funnel-stage .stage-name {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); margin-top: 6px; display: block;
}
.funnel-arrow {
  display: flex; align-items: center; color: rgba(200,169,81,0.4);
  font-size: 20px; padding: 0 2px;
}
.funnel-bar {
  height: 4px; margin-top: 10px; border-radius: 2px; background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.funnel-bar-fill {
  height: 100%; border-radius: 2px; background: var(--warm-gold);
  transition: width 0.6s;
}

/* Meta Ads */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.cpbc-highlight {
  background: var(--card-bg); border: 2px solid var(--warm-gold); border-radius: 16px;
  padding: 24px; text-align: center;
}
.cpbc-highlight .metric-value { font-size: 40px; }

/* Tables */
.table-wrapper {
  border-radius: 16px; border: var(--card-border); background: var(--card-bg);
  overflow: hidden;
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 12px 16px; text-align: left; font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; color: rgba(255,255,255,0.4); font-weight: 600;
  background: rgba(10, 46, 92, 0.5); border-bottom: 1px solid rgba(16, 71, 145, 0.3);
  white-space: nowrap;
}
thead th.right { text-align: right; }
tbody td {
  padding: 12px 16px; font-size: 14px;
  border-bottom: 1px solid var(--border-subtle); white-space: nowrap;
}
tbody td.right { text-align: right; }
tbody tr:hover { background: rgba(200, 169, 81, 0.05); }
tbody tr:last-child td { border-bottom: none; }
.total-row td {
  color: var(--warm-gold); font-weight: 700;
  border-top: 2px solid rgba(200,169,81,0.3);
}

/* Badges */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 10px;
  font-size: 12px; font-weight: 600;
}
.badge-green { background: rgba(39,174,96,0.15); color: var(--green-on); }
.badge-gold { background: rgba(200,169,81,0.15); color: var(--warm-gold); }
.badge-red { background: rgba(231,76,60,0.15); color: var(--red-alert); }
.badge-navy { background: rgba(16,71,145,0.25); color: #5B9BD5; }

/* Retention summary cards */
.retention-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }

/* Mentor summary */
.mentor-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }

/* Notes */
.notes-box {
  background: var(--card-bg); border: var(--card-border); border-radius: 16px;
  padding: 20px; min-height: 80px;
}
.notes-empty { color: var(--text-dim); font-size: 14px; font-style: italic; }

/* Period tabs */
.tab-group { display: flex; gap: 0; margin-bottom: 16px; }
.tab-btn {
  padding: 6px 16px; border: 1px solid rgba(16, 71, 145, 0.4); background: transparent;
  color: rgba(255,255,255,0.45); font-family: 'DM Sans', sans-serif; font-size: 11px;
  font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:first-child { border-radius: 16px 0 0 16px; }
.tab-btn:last-child { border-radius: 0 16px 16px 0; }
.tab-btn.active {
  background: var(--brand-navy); color: var(--warm-gold); border-color: var(--warm-gold);
}

/* Loading */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(16, 19, 24, 0.85); display: flex; align-items: center;
  justify-content: center; z-index: 1000; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.loading-overlay.visible { opacity: 1; pointer-events: all; }
.spinner {
  width: 40px; height: 40px; border: 3px solid rgba(200,169,81,0.2);
  border-top-color: var(--warm-gold); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* Mobile */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .meta-grid { grid-template-columns: 1fr; }
  .funnel { flex-wrap: wrap; }
  .funnel-stage { min-width: calc(50% - 8px); border-radius: 12px !important; }
  .funnel-arrow { display: none; }
  .retention-cards { grid-template-columns: 1fr; }
  .mentor-summary { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .header { flex-direction: column; align-items: flex-start; }
  .header-right { text-align: left; }
  .header-title { font-size: 20px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .metric-value { font-size: 26px; }
  .funnel-stage { min-width: 100%; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="container">
  <header class="header">
    <div>
      <div class="header-title">BLUES &amp; GREENS &mdash; DAILY DASHBOARD</div>
      <div class="header-subtitle" id="headerDate"></div>
    </div>
    <div class="header-right">
      <div>
        <div class="header-updated" id="headerUpdated">Last updated: --</div>
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Refresh data">&#x21bb;</button>
    </div>
  </header>

  <div id="dashboard"></div>
</div>

<script>
(function() {
  'use strict';

  var DATA = null;
  var repPeriod = 'mtd';
  var REFRESH_MS = 30 * 60 * 1000;

  function fmt(v, type) {
    if (v == null || v === '') return '--';
    if (type === '$') return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (type === '$int') return '$' + Math.round(Number(v)).toLocaleString('en-US');
    if (type === '%') return (Number(v) * 100).toFixed(0) + '%';
    if (type === '%raw') return Number(v).toFixed(1) + '%';
    if (type === 'int') return Number(v).toLocaleString('en-US');
    return String(v);
  }

  function closeBadge(rate) {
    if (rate == null) return '<span class="badge badge-gold">--</span>';
    var pct = Number(rate) * 100;
    var cls = pct >= 50 ? 'badge-green' : pct >= 30 ? 'badge-gold' : 'badge-red';
    return '<span class="badge ' + cls + '">' + pct.toFixed(0) + '%</span>';
  }

  function section(title, html) {
    return '<div class="section"><div class="section-header"><h2>' + title + '</h2></div>' + html + '</div>';
  }

  function render() {
    if (!DATA) return;
    var stripe = DATA.stripe || {};
    var pipeline = DATA.activation_pipeline || {};
    var meta = DATA.meta_ads || {};
    var reps = DATA.reps || [];
    var retention = DATA.retention || {};
    var mentors = DATA.mentors || {};
    var out = '';

    // 1. TOP STATS ROW
    var failedCls = stripe.failed_payments > 0 ? ' red' : '';
    var cancelCount = (stripe.recent_cancellations || []).length;
    out += '<div class="section" style="margin-top:24px"><div class="stats-row">';
    out += statCard('Active Members', fmt(stripe.active_subscriptions, 'int'), '');
    out += statCard('MRR', fmt(stripe.mrr, '$int'), '');
    out += statCard('New Subs Today', fmt(stripe.new_subscriptions, 'int'), '');
    out += statCard('Cancellations', fmt(cancelCount, 'int'), cancelCount > 0 ? ' red' : '');
    out += statCard('Failed Payments', fmt(stripe.failed_payments, 'int'), failedCls);
    out += '</div></div>';

    // 2. PIPELINE FUNNEL
    var stages = [
      { key: 'deposit_paid', label: 'Deposit Paid' },
      { key: 'agreement_signed', label: 'Agreement Signed' },
      { key: 'mentor_allocated', label: 'Mentor Allocated' },
      { key: 'w1_scheduled', label: 'W1 Scheduled' },
      { key: 'w1_complete', label: 'W1 Complete' }
    ];
    var maxCount = 1;
    stages.forEach(function(s) {
      var arr = pipeline[s.key];
      s.count = Array.isArray(arr) ? arr.length : 0;
      if (s.count > maxCount) maxCount = s.count;
    });
    var funnelHtml = '<div class="funnel">';
    stages.forEach(function(s, i) {
      if (i > 0) funnelHtml += '<div class="funnel-arrow">&#9654;</div>';
      var pct = Math.max(8, (s.count / maxCount) * 100);
      funnelHtml += '<div class="funnel-stage"><span class="stage-count">' + s.count +
        '</span><span class="stage-name">' + s.label + '</span>' +
        '<div class="funnel-bar"><div class="funnel-bar-fill" style="width:' + pct + '%"></div></div></div>';
    });
    funnelHtml += '</div>';
    out += section('Activation Pipeline', funnelHtml);

    // 3. META ADS
    var metaPeriods = ['today', 'wtd', 'mtd'];
    var metaHtml = '<div class="meta-grid">';
    metaPeriods.forEach(function(p) {
      var m = meta[p] || {};
      var label = p === 'today' ? 'Today' : p === 'wtd' ? 'Week to Date' : 'Month to Date';
      var cpbcVal = m.cpbc != null ? '$' + Number(m.cpbc).toFixed(2) : '--';
      var spendVal = m.spend != null ? '$' + Number(m.spend).toFixed(2) : '--';
      metaHtml += '<div class="stat-card" style="text-align:center">' +
        '<div class="stat-label" style="margin-bottom:12px">' + label + '</div>' +
        '<div class="metric-value" style="font-size:28px">' + cpbcVal + '</div>' +
        '<div class="metric-sub">Cost Per Booked Call</div>' +
        '<div style="margin-top:14px;display:flex;justify-content:space-around">' +
        '<div><div style="font-size:11px;color:' + 'rgba(255,255,255,0.4)' + ';text-transform:uppercase;letter-spacing:0.5px">Spend</div>' +
        '<div style="font-size:16px;font-weight:700;color:var(--white);margin-top:2px">' + spendVal + '</div></div>' +
        '<div><div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px">Calls</div>' +
        '<div style="font-size:16px;font-weight:700;color:var(--white);margin-top:2px">' + fmt(m.booked_calls, 'int') + '</div></div>' +
        '</div></div>';
    });
    metaHtml += '</div>';
    out += section('Meta Ads', metaHtml);

    // 4. REP PERFORMANCE
    var repTabHtml = '<div class="tab-group">' +
      ['today', 'wtd', 'mtd'].map(function(p) {
        var label = p === 'today' ? 'Day' : p === 'wtd' ? 'Week' : 'Month';
        return '<button class="tab-btn' + (repPeriod === p ? ' active' : '') + '" onclick="window.__setRepPeriod(\'' + p + '\')">' + label + '</button>';
      }).join('') + '</div>';

    var repTable = '<div class="table-wrapper"><div class="table-scroll"><table><thead><tr>' +
      '<th>Rep</th><th class="right">DCs Completed</th><th class="right">Closes</th>' +
      '<th class="right">W1 Starts</th><th class="right">Close Rate</th><th class="right">Revenue</th></tr></thead><tbody>';
    var totDC = 0, totClose = 0, totW1 = 0;
    reps.forEach(function(r) {
      var d = r[repPeriod] || {};
      var dc = d.dcs_taken || 0;
      var cl = d.closes || 0;
      var w1 = d.w1_starts || 0;
      totDC += dc; totClose += cl; totW1 += w1;
      repTable += '<tr><td>' + r.name + '</td><td class="right">' + dc +
        '</td><td class="right">' + cl + '</td><td class="right">' + w1 +
        '</td><td class="right">' + closeBadge(d.close_rate) +
        '</td><td class="right">--</td></tr>';
    });
    var totRate = totDC > 0 ? totClose / totDC : 0;
    repTable += '<tr class="total-row"><td>Total</td><td class="right">' + totDC +
      '</td><td class="right">' + totClose + '</td><td class="right">' + totW1 +
      '</td><td class="right">' + closeBadge(totRate) + '</td><td class="right">--</td></tr>';
    repTable += '</tbody></table></div></div>';
    out += section('Rep Performance', repTabHtml + repTable);

    // 5. RETENTION
    var s7count = (retention.session_7_plus || []).length;
    var resets = retention.payment_resets_30d || [];
    var retHtml = '<div class="retention-cards">';
    retHtml += '<div class="stat-card"><div class="stat-label">Session 7+ Members</div><div class="metric-value">' + s7count + '</div>' +
      '<div class="metric-sub">Long-term active members</div></div>';
    retHtml += '<div class="stat-card"><div class="stat-label">Payment Resets (Next 30d)</div><div class="metric-value' +
      (resets.length > 5 ? ' red' : '') + '">' + resets.length + '</div>' +
      '<div class="metric-sub">Coming up for renewal</div></div>';
    retHtml += '</div>';
    if (resets.length > 0) {
      retHtml += '<div class="table-wrapper"><div class="table-scroll"><table><thead><tr>' +
        '<th>Name</th><th>Reset Date</th><th>Days Away</th></tr></thead><tbody>';
      resets.forEach(function(r) {
        var days = Math.round((new Date(r.payment_reset_date) - new Date()) / 86400000);
        var urgent = days <= 7;
        var style = urgent ? ' style="color:var(--red-alert);font-weight:600"' : '';
        retHtml += '<tr><td' + style + '>' + r.name + '</td><td>' + r.payment_reset_date +
          '</td><td' + style + '>' + days + (urgent ? ' !!!' : '') + '</td></tr>';
      });
      retHtml += '</tbody></table></div></div>';
    }
    out += section('Retention', retHtml);

    // 6. MENTORS
    var mentorList = mentors.members_per_mentor || [];
    var mentorHtml = '<div class="mentor-summary">';
    mentorHtml += '<div class="stat-card"><div class="stat-label">Active Mentors</div><div class="metric-value">' +
      fmt(mentors.active_count, 'int') + '</div></div>';
    mentorHtml += '<div class="stat-card"><div class="stat-label">At Capacity</div><div class="metric-value' +
      (mentors.at_capacity > 0 ? ' red' : '') + '">' + fmt(mentors.at_capacity, 'int') + '</div></div>';
    var totalMembers = 0;
    mentorList.forEach(function(m) { totalMembers += m.count; });
    var avg = mentorList.length > 0 ? (totalMembers / mentorList.length).toFixed(1) : '--';
    mentorHtml += '<div class="stat-card"><div class="stat-label">Avg Members / Mentor</div><div class="metric-value" style="font-size:28px">' + avg + '</div></div>';
    mentorHtml += '</div>';
    if (mentorList.length > 0) {
      mentorHtml += '<div class="table-wrapper"><div class="table-scroll"><table><thead><tr>' +
        '<th>Mentor</th><th class="right">Members</th><th>Load</th></tr></thead><tbody>';
      var maxMembers = Math.max.apply(null, mentorList.map(function(m) { return m.count; }));
      mentorList.sort(function(a, b) { return b.count - a.count; });
      mentorList.forEach(function(m) {
        var pct = maxMembers > 0 ? (m.count / maxMembers * 100) : 0;
        var barColor = m.count >= 10 ? 'var(--red-alert)' : m.count >= 7 ? 'var(--warm-gold)' : 'var(--green-on)';
        mentorHtml += '<tr><td>' + m.mentor + '</td><td class="right">' + m.count +
          '</td><td><div style="display:flex;align-items:center;gap:8px">' +
          '<div style="width:100px;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden">' +
          '<div style="width:' + pct + '%;height:100%;border-radius:4px;background:' + barColor + '"></div></div>' +
          '</div></td></tr>';
      });
      mentorHtml += '</tbody></table></div></div>';
    }
    out += section('Mentors', mentorHtml);

    // 7. DAILY NOTES
    var notesHtml = '<div class="notes-box">';
    var notifications = (window.__notifications || []);
    if (notifications.length > 0) {
      notifications.forEach(function(n) {
        notesHtml += '<div style="padding:6px 0;border-bottom:1px solid var(--border-subtle);color:rgba(255,255,255,0.8);font-size:14px">' + n + '</div>';
      });
    } else {
      notesHtml += '<div class="notes-empty">No flags or notes for today.</div>';
    }
    notesHtml += '</div>';
    out += section('Daily Notes', notesHtml);

    document.getElementById('dashboard').innerHTML = out;

    // Update header
    var now = new Date();
    document.getElementById('headerDate').textContent =
      now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    var gen = DATA.generated_at ? new Date(DATA.generated_at) : now;
    document.getElementById('headerUpdated').textContent =
      'Last updated: ' + gen.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true, month: 'short', day: 'numeric' });
  }

  function statCard(label, value, cls) {
    return '<div class="stat-card"><div class="stat-label">' + label +
      '</div><div class="metric-value' + (cls || '') + '">' + value + '</div></div>';
  }

  window.__setRepPeriod = function(p) {
    repPeriod = p;
    render();
  };

  function fetchData(showLoader) {
    if (showLoader) document.getElementById('loadingOverlay').classList.add('visible');
    var btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');

    Promise.all([
      fetch('../data/dashboard-data.json?t=' + Date.now()).then(function(r) { return r.json(); }),
      fetch('../data/leo-notifications.json?t=' + Date.now()).then(function(r) { return r.json(); }).catch(function() { return { notifications: [] }; })
    ]).then(function(results) {
      DATA = results[0];
      window.__notifications = results[1].notifications || [];
      render();
    }).catch(function(e) {
      console.error('Failed to load data:', e);
      if (!DATA) {
        document.getElementById('dashboard').innerHTML =
          '<div style="margin-top:40px;text-align:center;color:var(--red-alert)">Failed to load data. Ensure ../data/dashboard-data.json exists.</div>';
      }
    }).finally(function() {
      document.getElementById('loadingOverlay').classList.remove('visible');
      btn.classList.remove('spinning');
    });
  }

  document.getElementById('refreshBtn').addEventListener('click', function() { fetchData(true); });

  fetchData(true);
  setInterval(function() { fetchData(false); }, REFRESH_MS);
})();
</script>
</body>
</html>
