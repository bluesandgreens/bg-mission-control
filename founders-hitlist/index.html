<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text2: #8888a0;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --yellow: #eab308;
  --yellow-bg: rgba(234,179,8,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --orange: #f97316;
  --orange-bg: rgba(249,115,22,0.12);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 1400px; margin: 0 auto; padding: 16px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 24px; font-weight: 700; }
.header h1 span { color: var(--accent2); }
.header-stats { display: flex; gap: 16px; flex-wrap: wrap; }
.stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.stat-pill .num { font-weight: 700; font-size: 15px; }
.stat-pill.green .num { color: var(--green); }
.stat-pill.yellow .num { color: var(--yellow); }
.stat-pill.blue .num { color: var(--blue); }
.stat-pill.red .num { color: var(--red); }

/* Tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); padding-bottom: 0; margin-bottom: 20px; overflow-x: auto; }
.tab { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* Filters */
.filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 12px; transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--text); font-size: 13px; width: 220px; outline: none; }
.search-box:focus { border-color: var(--accent); }

/* Pipeline View */
.pipeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.pipeline-col { background: var(--surface); border-radius: 12px; padding: 14px; min-height: 200px; }
.pipeline-col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.pipeline-col-title { font-weight: 600; font-size: 14px; }
.pipeline-col-count { background: var(--surface2); border-radius: 10px; padding: 2px 8px; font-size: 12px; color: var(--text2); }

/* Cards */
.card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; position: relative; }
.card:hover { border-color: var(--accent); transform: translateY(-1px); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-name { font-weight: 600; font-size: 14px; }
.card-score { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.score-high { background: var(--green-bg); color: var(--green); }
.score-med { background: var(--yellow-bg); color: var(--yellow); }
.score-low { background: var(--red-bg); color: var(--red); }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.badge { padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 500; }
.badge-ndis { background: var(--purple-bg); color: var(--purple); }
.badge-melb { background: var(--blue-bg); color: var(--blue); }
.badge-prepay { background: var(--green-bg); color: var(--green); }
.badge-weekly { background: var(--orange-bg); color: var(--orange); }
.badge-inactive { background: var(--red-bg); color: var(--red); }
.badge-irl { background: var(--yellow-bg); color: var(--yellow); }
.card-detail { font-size: 12px; color: var(--text2); line-height: 1.5; }
.card-revenue { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 6px; }
.card-flags { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.flag { font-size: 11px; padding: 3px 0; display: flex; align-items: flex-start; gap: 4px; }
.flag-icon { flex-shrink: 0; }

/* List View */
.list-view { display: none; }
.list-table { width: 100%; border-collapse: collapse; }
.list-table th { text-align: left; padding: 10px 12px; font-size: 12px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
.list-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: top; }
.list-table tr:hover td { background: var(--surface); }

/* Detail Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: flex-start; padding: 40px 16px; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 680px; padding: 0; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 20px; }
.modal-close { cursor: pointer; font-size: 24px; color: var(--text2); background: none; border: none; }
.modal-body { padding: 20px 24px; }
.modal-section { margin-bottom: 20px; }
.modal-section h3 { font-size: 14px; color: var(--accent2); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
.modal-field .label { color: var(--text2); }
.modal-field .value { font-weight: 500; text-align: right; }
.modal-notes { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-size: 13px; font-family: inherit; resize: vertical; min-height: 100px; outline: none; }
.modal-notes:focus { border-color: var(--accent); }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; }
.btn { padding: 8px 18px; border-radius: 10px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-success { background: var(--green); color: white; }
.btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
select.stage-select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; outline: none; }

/* Conversation Points */
.convo-points { list-style: none; }
.convo-points li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; display: flex; gap: 8px; align-items: flex-start; }
.convo-points li:last-child { border-bottom: none; }
.convo-icon { flex-shrink: 0; margin-top: 2px; }

/* NDIS Info Panel */
.ndis-panel { background: var(--purple-bg); border: 1px solid rgba(168,85,247,0.3); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.ndis-panel h3 { color: var(--purple); margin-bottom: 10px; font-size: 14px; }
.ndis-panel p { font-size: 13px; line-height: 1.6; color: var(--text); margin-bottom: 8px; }
.ndis-panel ul { list-style: none; padding-left: 0; }
.ndis-panel li { padding: 4px 0; font-size: 13px; }
.ndis-panel li::before { content: "→ "; color: var(--purple); }

/* Summary bar */
.summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.summary-card .big { font-size: 28px; font-weight: 700; }
.summary-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* View toggle */
.view-toggle { display: flex; gap: 4px; background: var(--surface); border-radius: 8px; padding: 3px; }
.view-btn { padding: 6px 12px; border-radius: 6px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; }
.view-btn.active { background: var(--accent); color: white; }

/* Call Mode */
.call-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:var(--bg); z-index:200; overflow-y:auto; }
.call-overlay.show { display:block; }
.call-header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
.call-header-left { display:flex; align-items:center; gap:16px; }
.call-header-left h2 { font-size:20px; }
.call-header-left .call-meta { font-size:13px; color:var(--text2); }
.call-actions { display:flex; gap:8px; flex-wrap:wrap; }
.call-body { display:grid; grid-template-columns:1fr 380px; gap:0; min-height:calc(100vh - 70px); }
.call-scripts { padding:20px; overflow-y:auto; }
.call-sidebar { background:var(--surface); border-left:1px solid var(--border); padding:20px; overflow-y:auto; }
.call-script-tabs { display:flex; gap:4px; margin-bottom:16px; position:sticky; top:0; background:var(--bg); padding:8px 0; z-index:5; }
.call-script-tab { padding:10px 20px; border-radius:10px; border:2px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-size:14px; font-weight:600; transition:all 0.2s; flex:1; text-align:center; }
.call-script-tab:hover { border-color:var(--accent); }
.call-script-tab.active-fe { border-color:var(--accent); color:var(--accent2); background:rgba(99,102,241,0.1); }
.call-script-tab.active-accel { border-color:var(--yellow); color:var(--yellow); background:rgba(234,179,8,0.1); }
.script-content { font-size:15px; line-height:1.9; color:var(--text); }
.script-content .script-section { margin-bottom:24px; padding:16px; background:var(--surface); border-radius:12px; border:1px solid var(--border); }
.script-content .script-section h4 { color:var(--accent2); font-size:13px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
.script-content .script-line { margin-bottom:12px; padding-left:12px; border-left:2px solid var(--border); }
.script-content .script-line.emphasis { border-left-color:var(--accent); background:rgba(99,102,241,0.05); padding:10px 12px; border-radius:0 8px 8px 0; }
.script-content .script-line.accel-emphasis { border-left-color:var(--yellow); background:rgba(234,179,8,0.05); padding:10px 12px; border-radius:0 8px 8px 0; }
.call-sidebar h3 { font-size:13px; color:var(--accent2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
.call-sidebar .sidebar-section { margin-bottom:20px; }
.call-quick-note { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-size:13px; font-family:inherit; resize:vertical; min-height:80px; outline:none; }
.call-quick-note:focus { border-color:var(--accent); }
.call-point { font-size:13px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); line-height:1.5; }
.call-info-row { display:flex; justify-content:space-between; padding:5px 0; font-size:13px; }
.call-info-row .label { color:var(--text2); }
.pulse-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; margin-right:6px; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* HubSpot Add Button */
.col-add-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 5px; border-radius: 6px; transition: all 0.2s; flex-shrink: 0; }

/* HubSpot Search Modal */
.hs-modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 150; justify-content: center; align-items: center; padding: 16px; }

.hs-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 480px; animation: slideUp 0.2s ease; overflow: hidden; }

.hs-results { max-height: 340px; overflow-y: auto; }
.hs-result-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
.hs-result-item:hover { background: var(--surface2); }

.hs-result-name { font-weight: 600; font-size: 14px; }
.hs-result-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Mobile */
@media (max-width: 768px) {
  .pipeline { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; }
  .filters { flex-direction: column; }
  .search-box { width: 100%; }
  .modal { margin-top: 0; border-radius: 12px; }
  .call-body { grid-template-columns: 1fr; }
  .call-sidebar { border-left: none; border-top: 1px solid var(--border); }
}
</style>

// ============ STATE ============
let currentFilter = 'all';
let currentView = 'board';
let currentTab = 'pipeline';
let searchTerm = '';

// Load saved state
function loadState() {
  try {
    const saved = localStorage.getItem('fe-hitlist-state');
    if (saved) {
      const state = JSON.parse(saved);
      contacts = contacts.map(c => {
        const s = state.find(x => x.id === c.id);
        if (s) {
          c.stage = s.stage || c.stage;
          c.notes = s.notes || c.notes;
          c.score = s.score !== undefined ? s.score : c.score;
          c.likelihood = s.likelihood !== undefined ? s.likelihood : c.likelihood;
          c.offerType = s.offerType || c.offerType;
        }
        return c;
      });
    }
  } catch(e) {}
}

function saveState() {
  const state = contacts.map(c => ({ id: c.id, stage: c.stage, notes: c.notes, score: c.score, likelihood: c.likelihood, offerType: c.offerType }));
  localStorage.setItem('fe-hitlist-state', JSON.stringify(state));
}

// ============ RENDER ============
function getFilteredContacts() {
  let filtered = contacts;
  if (currentFilter === 'ndis') filtered = filtered.filter(c => c.isNDIS);
  if (currentFilter === 'melb') filtered = filtered.filter(c => c.isMelbourne);
  if (currentFilter === 'prepay') filtered = filtered.filter(c => c.paymentType.includes('prepay'));
  if (currentFilter === 'inactive') filtered = filtered.filter(c => c.inactive);
  if (currentFilter === 'due') filtered = filtered.filter(c => c.paymentDue && c.paymentDue !== '' && c.paymentDue !== 'N/A — NDIS' && c.paymentDue !== 'N/A — inactive' && c.paymentDue !== 'N/A — 19 sessions remaining');
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(c => c.name.toLowerCase().includes(s) || (c.sonName && c.sonName.toLowerCase().includes(s)) || c.location.toLowerCase().includes(s));
  }
  return filtered;
}

function getPipelineValue() {
  return contacts
    .filter(c => c.stage === 'offer-sent')
    .reduce((sum, c) => {
      const price = c.offerType === 'fe-lite' ? ACCEL_PRICE : FE_PRICE;
      return sum + (price * (c.likelihood || 0) / 100);
    }, 0);
}

function getTotalPipelineValue() {
  return contacts
    .filter(c => c.stage === 'offer-sent')
    .reduce((sum, c) => {
      const price = c.offerType === 'fe-lite' ? ACCEL_PRICE : FE_PRICE;
      return sum + price;
    }, 0);
}

function getAcceptedValue() {
  return contacts
    .filter(c => c.stage === 'accepted')
    .reduce((sum, c) => {
      const price = c.offerType === 'fe-lite' ? ACCEL_PRICE : FE_PRICE;
      return sum + price;
    }, 0);
}

function renderStats() {
  const total = contacts.length;
  const contacted = contacts.filter(c => c.stage !== 'not-contacted').length;
  const accepted = contacts.filter(c => c.stage === 'accepted').length;
  const offerSent = contacts.filter(c => c.stage === 'offer-sent').length;
  const pipelineVal = getPipelineValue();
  const acceptedVal = getAcceptedValue();
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill blue"><span class="num">${total}</span> Total</div>
    <div class="stat-pill yellow"><span class="num">${contacted}</span> Contacted</div>
    <div class="stat-pill" style="border-color:var(--orange)"><span class="num" style="color:var(--orange)">${offerSent}</span> Offers Out</div>
    <div class="stat-pill green"><span class="num">${accepted}</span> Accepted</div>
    <div class="stat-pill"><span class="num" style="color:var(--orange)">$${(pipelineVal/1000).toFixed(1)}K</span> Weighted Pipeline</div>
    <div class="stat-pill green"><span class="num">$${(acceptedVal/1000).toFixed(1)}K</span> Accepted Rev</div>
  `;
}

function renderSummary() {
  const ndis = contacts.filter(c => c.isNDIS).length;
  const melb = contacts.filter(c => c.isMelbourne).length;
  const urgent = contacts.filter(c => c.paymentDue && (c.paymentDue.includes('TODAY') || c.paymentDue.includes('URGENT') || c.paymentDue.includes('OVERDUE') || c.paymentDue.includes('~1 week'))).length;
  const totalPipeline = getTotalPipelineValue();
  const weightedPipeline = getPipelineValue();
  const accelCount = contacts.filter(c => c.offerType === 'fe-lite').length;
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card"><div class="big" style="color:var(--purple)">${ndis}</div><div class="label">NDIS Clients</div></div>
    <div class="summary-card"><div class="big" style="color:var(--blue)">${melb}</div><div class="label">Melbourne IRL</div></div>
    <div class="summary-card"><div class="big" style="color:var(--red)">${urgent}</div><div class="label">Urgent / Due Now</div></div>
    <div class="summary-card"><div class="big" style="color:var(--orange)">$${(totalPipeline/1000).toFixed(1)}K</div><div class="label">Total Pipeline</div></div>
    <div class="summary-card"><div class="big" style="color:var(--green)">$${(weightedPipeline/1000).toFixed(1)}K</div><div class="label">Weighted (by likelihood)</div></div>
    <div class="summary-card"><div class="big" style="color:var(--yellow)">${accelCount}</div><div class="label">FE Lite Offers</div></div>
  `;
}

function renderCard(c) {
  const scoreClass = c.score >= 8 ? 'score-high' : c.score >= 6 ? 'score-med' : 'score-low';
  const badges = [];
  if (c.offerType === 'fe-lite') badges.push('<span class="badge" style="background:rgba(234,179,8,0.2);color:#eab308">⚡ FE Lite</span>');
  if (c.isNDIS) badges.push('<span class="badge badge-ndis">NDIS</span>');
  if (c.isMelbourne) badges.push('<span class="badge badge-melb">Melbourne</span>');
  if (c.paymentType.includes('prepay')) badges.push('<span class="badge badge-prepay">Prepaid</span>');
  if (c.paymentType.includes('weekly')) badges.push('<span class="badge badge-weekly">Weekly</span>');
  if (c.inactive) badges.push('<span class="badge badge-inactive">Re-engage</span>');
  if (c.isMelbourne && !c.inactive) badges.push('<span class="badge badge-irl">IRL Ready</span>');
  
  const flagsHtml = c.flags.slice(0,3).map(f => `<div class="flag"><span class="flag-icon">${f.charAt(0)}</span>${f.substring(2)}</div>`).join('');
  
  const price = c.offerType === 'fe-lite' ? ACCEL_PRICE : FE_PRICE;
  const likelihoodHtml = c.stage === 'offer-sent' && c.likelihood > 0 
    ? `<div style="margin-top:6px;display:flex;align-items:center;gap:8px;">
        <div style="flex:1;background:var(--border);border-radius:4px;height:6px;overflow:hidden;">
          <div style="width:${c.likelihood}%;height:100%;background:${c.likelihood >= 70 ? 'var(--green)' : c.likelihood >= 40 ? 'var(--yellow)' : 'var(--red)'};border-radius:4px;"></div>
        </div>
        <span style="font-size:11px;font-weight:700;color:${c.likelihood >= 70 ? 'var(--green)' : c.likelihood >= 40 ? 'var(--yellow)' : 'var(--red)'}">${c.likelihood}%</span>
        <span style="font-size:11px;color:var(--text2)">$${(price * c.likelihood / 100).toLocaleString()}</span>
      </div>` 
    : c.stage === 'offer-sent' 
    ? `<div style="font-size:11px;color:var(--text2);margin-top:6px">⚠️ Set likelihood →</div>` 
    : '';
  
  return `
    <div class="card" onclick="openModal(${c.id})" draggable="true" ondragstart="dragStart(event, ${c.id})">
      <div class="card-header">
        <div class="card-name">${c.name}</div>
        <div class="card-score ${scoreClass}">${c.score}</div>
      </div>
      <div class="card-meta">${badges.join('')}</div>
      <div class="card-detail">${c.location}${c.sonName ? ' · Son: '+c.sonName : ''}</div>
      ${c.totalPaid > 0 ? `<div class="card-revenue">$${c.totalPaid.toLocaleString()} lifetime</div>` : ''}
      ${c.paymentDue && c.paymentDue !== '' ? `<div class="card-detail" style="color:var(--orange);margin-top:4px">⏰ ${c.paymentDue}</div>` : ''}
      ${likelihoodHtml}
      ${flagsHtml ? `<div class="card-flags">${flagsHtml}</div>` : ''}
    </div>
  `;
}

function renderPipeline() {
  const filtered = getFilteredContacts();
  let html = '';
  for (const [stageId, stageInfo] of Object.entries(STAGES)) {
    const stageContacts = filtered.filter(c => c.stage === stageId);
    const stageValue = stageContacts.reduce((sum, c) => {
      const price = c.offerType === 'fe-lite' ? ACCEL_PRICE : FE_PRICE;
      if (stageId === 'offer-sent') return sum + (price * (c.likelihood || 0) / 100);
      if (stageId === 'accepted') return sum + price;
      return sum;
    }, 0);
    const valueLabel = (stageId === 'offer-sent' || stageId === 'accepted') && stageValue > 0 
      ? `<div style="font-size:11px;color:${stageInfo.color};margin-left:4px">$${stageValue.toLocaleString()}</div>` 
      : '';
    html += `
      <div class="pipeline-col" ondrop="drop(event, '${stageId}')" ondragover="allowDrop(event)">
        <div class="pipeline-col-header">
          <div class="pipeline-col-title" style="color:${stageInfo.color}">${stageInfo.label}</div>
          <div style="display:flex;align-items:center;gap:6px">
            ${valueLabel}
            <div class="pipeline-col-count">${stageContacts.length}</div>
            <button class="col-add-btn" onclick="event.stopPropagation();openHSSearch('${stageId}')" title="Add from HubSpot">+</button>
          </div>
        </div>
        ${stageContacts.map(c => renderCard(c)).join('')}
      </div>
    `;
  }
  document.getElementById('pipelineView').innerHTML = html;
}

  filtered.sort((a,b) => b.score - a.score).forEach(c => {

        <td>${c.likelihood ? c.likelihood+'%' : '—'}</td>
        <td style="color:var(--green)">$${c.totalPaid.toLocaleString()}</td>
        <td style="font-size:11px">${c.flags.slice(0,2).join('<br>')}</td>
      </tr>
    `;
  });
  html += '</tbody></table>';
  document.getElementById('listView').innerHTML = html;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function updateStage(id, stage) {
  const c = contacts.find(x => x.id === id);
  if (c) { c.stage = stage; saveState(); render(); }
}

function updateScore(id, score) {
  const c = contacts.find(x => x.id === id);
  if (c) { c.score = score; saveState(); }
}

function updateLikelihood(id, likelihood) {
  const c = contacts.find(x => x.id === id);
  if (c) { c.likelihood = likelihood; saveState(); render(); }
}

function updateOfferType(id, type) {
  const c = contacts.find(x => x.id === id);
  if (c) {
    c.offerType = type;
    saveState();
    // Update buttons without full re-render
    document.getElementById('modalBtnFE').className = 'btn ' + (type !== 'fe-lite' ? 'btn-primary' : 'btn-secondary');
    document.getElementById('modalBtnAccel').className = 'btn ' + (type === 'fe-lite' ? 'btn-primary' : 'btn-secondary');
    renderModalScript(c);
    render();
  }
}

function toggleNDIS() {
  const el = document.getElementById('ndisPopup');
  const chev = document.getElementById('ndisChevron');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    chev.textContent = '▲';
  } else {
    el.style.display = 'none';
    chev.textContent = '▼';
  }
}

// ============ DRAG & DROP ============
let draggedId = null;
function dragStart(e, id) { draggedId = id; e.dataTransfer.effectAllowed = 'move'; }
function allowDrop(e) { e.preventDefault(); }
function drop(e, stage) {
  e.preventDefault();
  if (draggedId) {
    const c = contacts.find(x => x.id === draggedId);
    if (c) { c.stage = stage; saveState(); render(); }
    draggedId = null;
  }
}

// ============ EVENTS ============
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('pipelineView').style.display = currentView === 'board' ? 'grid' : 'none';
    document.getElementById('listView').style.display = currentView === 'list' ? 'block' : 'none';
    render();
  });
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    
    document.getElementById('pipelineView').style.display = 'none';
    document.getElementById('listView').style.display = 'none';
    document.getElementById('ndisView').style.display = 'none';
    document.getElementById('scriptsView').style.display = 'none';
    document.querySelector('.filters').style.display = 'none';
    document.getElementById('summaryBar').style.display = 'none';
    
    if (currentTab === 'pipeline') {
      document.querySelector('.filters').style.display = 'flex';
      document.getElementById('summaryBar').style.display = 'grid';
      if (currentView === 'board') document.getElementById('pipelineView').style.display = 'grid';
      else document.getElementById('listView').style.display = 'block';
    } else if (currentTab === 'list') {
      document.querySelector('.filters').style.display = 'flex';
      document.getElementById('summaryBar').style.display = 'grid';
      document.getElementById('listView').style.display = 'block';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.view-btn[data-view="list"]').classList.add('active');
      currentView = 'list';
    } else if (currentTab === 'ndis') {
      document.getElementById('ndisView').style.display = 'block';
      renderNDIS();
    } else if (currentTab === 'scripts') {
      document.getElementById('scriptsView').style.display = 'block';
      renderScripts();
    }
    render();
  });
});

          ${c && c.weeksActive > 15 ? '<li style="padding:4px 0;font-size:13px;">→ Long-term member: Doesn\'t need more sessions — needs the EXPERIENCE</li>' : ''}
          ${c && c.isMelbourne ? '<li style="padding:4px 0;font-size:13px;">→ Melbourne: IRL is easy — no flights, just show up</li>' : '<li style="padding:4px 0;font-size:13px;">→ Interstate: The Melbourne trip IS the experience — make it special</li>'}
          ${c && c.isNDIS ? '<li style="padding:4px 0;font-size:13px;">→ NDIS: Shorter program = easier to get plan manager approval</li>' : ''}
        </ul>
      </div>
    </div>
  `;
}

function exitCallMode() {
  document.getElementById('callOverlay').classList.remove('show');
  callContactId = null;
  render();
}

// ============ INIT ============
function render() {
  renderStats();
  renderSummary();
  renderPipeline();
  renderList();
}

loadState();
render();

// ============ HUBSPOT CONTACT SEARCH ============
const HS_PORTAL_ID = '48782903';
let hsCurrentStage = null;
let hsSearchTimer = null;
let hsSearchResults = [];

function getHSToken() { return localStorage.getItem('hs_pat') || ''; }

function promptHSToken() {
  const cur = getHSToken();
  const tok = prompt('Enter your HubSpot Private App Token:', cur);
  if (tok !== null && tok.trim()) {
    localStorage.setItem('hs_pat', tok.trim());
    updateHSTokenBar();
  }
}

function updateHSTokenBar() {
  const bar = document.getElementById('hsTokenBar');
  if (!bar) return;
  const tok = getHSToken();
  bar.innerHTML = tok
    ? `<span style="color:var(--green)">✓ Token set</span> · <a href="#" onclick="event.preventDefault();promptHSToken()" style="color:var(--text2)">Change</a>`
    : `<a href="#" onclick="event.preventDefault();promptHSToken()" style="color:var(--accent2)">⚙ Set HubSpot API token</a> to enable search`;
}

function openHSSearch(stageId) {
  hsCurrentStage = stageId;
  document.getElementById('hsStageLabel').textContent = STAGES[stageId].label;
  document.getElementById('hsStageLabel').style.color = STAGES[stageId].color;
  document.getElementById('hsSearchInput').value = '';
  document.getElementById('hsResults').innerHTML = '<div class="hs-empty">Type a name to search your HubSpot contacts</div>';
  document.getElementById('hsModalOverlay').classList.add('show');
  updateHSTokenBar();
  setTimeout(() => document.getElementById('hsSearchInput').focus(), 100);
}

function closeHSSearch() {
  document.getElementById('hsModalOverlay').classList.remove('show');
  hsCurrentStage = null;
}

function debounceHSSearch() {
  clearTimeout(hsSearchTimer);
  const q = document.getElementById('hsSearchInput').value.trim();
  if (q.length < 2) {
    document.getElementById('hsResults').innerHTML = '<div class="hs-empty">Type a name to search your HubSpot contacts</div>';
    return;
  }
  hsSearchTimer = setTimeout(doHSSearch, 400);
}

async function doHSSearch() {
  const q = document.getElementById('hsSearchInput').value.trim();
  if (!q) return;
  const token = getHSToken();
  if (!token) {
    document.getElementById('hsResults').innerHTML = '<div class="hs-empty">⚠️ <a href="#" onclick="event.preventDefault();promptHSToken()" style="color:var(--accent2)">Set your HubSpot API token first</a></div>';
    return;
  }
  document.getElementById('hsResults').innerHTML = '<div class="hs-empty">Searching…</div>';
  try {
    const res = await fetch('https://ltpkeddkkrexynlhgxal.supabase.co/functions/v1/hs-proxy', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: q,
        limit: 10,
        properties: ['firstname', 'lastname', 'email', 'phone', 'city', 'state']
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      document.getElementById('hsResults').innerHTML = `<div class="hs-empty">Error ${res.status}: ${err.message || 'Check token & scopes'}. <a href="#" onclick="event.preventDefault();promptHSToken()" style="color:var(--accent2)">Update token</a></div>`;
      return;
    }
    const data = await res.json();
    hsSearchResults = data.results || [];
    renderHSResults();
  } catch(e) {
    document.getElementById('hsResults').innerHTML = `<div class="hs-empty">Request failed — check your token and try again.</div>`;
    console.error('HubSpot search error:', e);
  }
}

function renderHSResults() {
  if (!hsSearchResults.length) {
    document.getElementById('hsResults').innerHTML = '<div class="hs-empty">No contacts found</div>';
    return;
  }
  document.getElementById('hsResults').innerHTML = hsSearchResults.map((r, i) => {
    const p = r.properties;
    const name = [p.firstname, p.lastname].filter(Boolean).join(' ') || '(No name)';
    const meta = [p.email, p.city, p.state].filter(Boolean).join(' · ');
    const exists = contacts.some(c => c.hubspotId === r.id);
    return `<div class="hs-result-item" onclick="addContactFromHS(${i})">
      <div class="hs-result-name">${name}${exists ? ' <span style="color:var(--text2);font-size:11px;font-weight:400">(already in pipeline)</span>' : ''}</div>
      <div class="hs-result-meta">${meta || 'No email on file'}</div>
    </div>`;
  }).join('');
}

function addContactFromHS(idx) {
  const r = hsSearchResults[idx];
  const p = r.properties;
  const name = [p.firstname, p.lastname].filter(Boolean).join(' ') || 'Unknown';
  const newId = Math.max(...contacts.map(c => c.id), 0) + 1;
  contacts.push({
    id: newId, name, sonName: '', stage: hsCurrentStage,
    location: [p.city, p.state].filter(Boolean).join(', ') || 'Unknown',
    state: p.state || '', mentorLocation: '', paymentType: 'weekly',
    isNDIS: false, isMelbourne: false, totalPaid: 0, weeklyRate: 0,
    weeksActive: 0, sessions: 0, stripeCust: '', hubspotId: r.id,
    hubspotUrl: `https://app.hubspot.com/contacts/${HS_PORTAL_ID}/record/0-1/${r.id}`,
    email: p.email || '', phone: p.phone || '',
    currentSub: 'New — check HubSpot', paymentDue: '',
    score: 5, flags: ['🆕 Added from HubSpot'], convoPoints: [],
    notes: '', sessionWins: [], inactive: false, likelihood: 0, offerType: 'fe'
  });
  closeHSSearch();
  render();
}
</script>

<!-- HubSpot Contact Search Modal -->
<div class="hs-modal-overlay" id="hsModalOverlay" onclick="if(event.target===this)closeHSSearch()">
  <div class="hs-modal">
    <div class="hs-modal-header">
      <h3>Add to <span id="hsStageLabel"></span></h3>
      <button class="modal-close" onclick="closeHSSearch()">&times;</button>
    </div>
    <div class="hs-search-row">
      <input class="hs-search-input" id="hsSearchInput" placeholder="Search HubSpot contact name…" oninput="debounceHSSearch()" onkeydown="if(event.key==='Enter')doHSSearch()" autocomplete="off">
      <button class="btn btn-primary" onclick="doHSSearch()" style="flex-shrink:0;padding:9px 16px">Search</button>
    </div>
    <div class="hs-results" id="hsResults">
      <div class="hs-empty">Type a name to search your HubSpot contacts</div>
    </div>
    <div class="hs-token-bar" id="hsTokenBar"></div>
  </div>
</div>
