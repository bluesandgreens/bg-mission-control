<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ Morning Brief — Blues &amp; Greens</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px 16px 40px; }
  .container { max-width: 900px; margin: 0 auto; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 22px; font-weight: 700; }
  .header-left .tagline { font-size: 12px; color: #64748b; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .date-badge { font-size: 12px; color: #94a3b8; background: #1e293b; border-radius: 8px; padding: 5px 12px; font-weight: 500; }
  .refresh-btn { background: #1e40af; color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-weight: 600; }
  .refresh-btn:hover { background: #1d4ed8; }

  /* Sections */
  .section { margin-bottom: 28px; }
  .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #475569; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(148,163,184,0.15); }

  /* Hero metric grid */
  .hero-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
  .hero-card { background: #1e293b; border: 1px solid rgba(148,163,184,0.1); border-radius: 12px; padding: 14px 16px; }
  .hero-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 4px; font-weight: 600; }
  .hero-card .value { font-size: 28px; font-weight: 700; line-height: 1.1; }
  .hero-card .sub { font-size: 11px; color: #64748b; margin-top: 4px; }
  .hero-card .trend-up { color: #4ade80; }
  .hero-card .trend-down { color: #f87171; }
  .hero-card .trend-flat { color: #94a3b8; }

  /* Secondary metric grid */
  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .metric-card { background: rgba(30,41,59,0.6); border: 1px solid rgba(148,163,184,0.08); border-radius: 10px; padding: 10px 12px; }
  .metric-card .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #475569; margin-bottom: 3px; font-weight: 600; }
  .metric-card .value { font-size: 18px; font-weight: 700; color: #e2e8f0; }
  .metric-card .sub { font-size: 10px; color: #475569; margin-top: 2px; }

  /* Scorecard */
  .scorecard-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .scorecard-col { background: #1e293b; border: 1px solid rgba(148,163,184,0.1); border-radius: 10px; padding: 12px; }
  .scorecard-col .col-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .wins .col-title { color: #4ade80; }
  .misses .col-title { color: #f87171; }
  .carry .col-title { color: #fbbf24; }
  .scorecard-col ul { list-style: none; }
  .scorecard-col li { font-size: 12px; color: #cbd5e1; padding: 4px 0; border-bottom: 1px solid rgba(148,163,184,0.07); line-height: 1.4; }
  .scorecard-col li:last-child { border-bottom: none; }
  .scorecard-col li::before { margin-right: 6px; }
  .wins li::before { content: "✓"; color: #4ade80; }
  .misses li::before { content: "✕"; color: #f87171; }
  .carry li::before { content: "→"; color: #fbbf24; }

  /* Leo's Lab */
  .lab-item { background: #1e293b; border: 1px solid rgba(148,163,184,0.1); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .lab-item:hover { border-color: rgba(148,163,184,0.25); }
  .lab-item.expanded { border-color: rgba(59,130,246,0.4); }
  .lab-header { display: flex; align-items: flex-start; gap: 10px; }
  .lab-emoji { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
  .lab-content { flex: 1; }
  .lab-headline { font-size: 13px; font-weight: 600; color: #e2e8f0; line-height: 1.4; }
  .lab-tag { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 10px; margin-top: 5px; background: rgba(59,130,246,0.15); color: #93c5fd; }
  .lab-tag.infrastructure { background: rgba(168,85,247,0.15); color: #d8b4fe; }
  .lab-tag.revenue { background: rgba(34,197,94,0.15); color: #86efac; }
  .lab-tag.sales { background: rgba(249,115,22,0.15); color: #fed7aa; }
  .lab-tag.retention { background: rgba(234,179,8,0.15); color: #fef08a; }
  .lab-tag.sales-quality { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .lab-detail { display: none; margin-top: 10px; font-size: 13px; color: #94a3b8; line-height: 1.6; padding-top: 10px; border-top: 1px solid rgba(148,163,184,0.1); }
  .lab-item.expanded .lab-detail { display: block; }
  .lab-chevron { font-size: 12px; color: #475569; flex-shrink: 0; transition: transform 0.15s; margin-top: 2px; }
  .lab-item.expanded .lab-chevron { transform: rotate(90deg); }

  /* One Thing */
  .one-thing { background: linear-gradient(135deg, #1e3a5f, #1e293b); border: 1px solid rgba(59,130,246,0.3); border-radius: 12px; padding: 16px 20px; text-align: center; }
  .one-thing .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #3b82f6; font-weight: 700; margin-bottom: 8px; }
  .one-thing .text { font-size: 15px; font-weight: 600; color: #e2e8f0; line-height: 1.5; }

  /* DC Reps */
  .rep-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .rep-card { background: #1e293b; border: 1px solid rgba(148,163,184,0.1); border-radius: 10px; padding: 12px 14px; }
  .rep-card.p3-flag { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); }
  .rep-name { font-size: 13px; font-weight: 700; color: #e2e8f0; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .rep-name .flag { font-size: 11px; background: rgba(239,68,68,0.2); color: #fca5a5; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
  .rep-stats { display: flex; gap: 12px; margin-bottom: 6px; }
  .rep-stat { text-align: center; }
  .rep-stat .val { font-size: 17px; font-weight: 700; }
  .rep-stat .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; color: #475569; }
  .rep-close-rate .val { color: #4ade80; }
  .rep-siel .val { color: #93c5fd; }
  .rep-trend { font-size: 10px; color: #64748b; margin-top: 4px; }
  .rep-trend.declining { color: #f87171; }
  .rep-trend.holding { color: #fbbf24; }
  .rep-trend.up { color: #4ade80; }
  .rep-improvement { font-size: 11px; color: #475569; margin-top: 6px; line-height: 1.4; }

  /* Dashboard links */
  .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .dash-link { display: flex; align-items: center; gap: 10px; background: #1e293b; border: 1px solid rgba(148,163,184,0.1); border-radius: 10px; padding: 12px 14px; text-decoration: none; color: #e2e8f0; transition: all 0.15s; }
  .dash-link:hover { border-color: rgba(59,130,246,0.4); background: rgba(30,41,59,0.8); transform: translateY(-1px); }
  .dash-link .icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .dash-link .info {}
  .dash-link .name { font-size: 13px; font-weight: 600; }
  .dash-link .desc { font-size: 11px; color: #64748b; margin-top: 2px; }
  .dash-link .arrow { margin-left: auto; font-size: 14px; color: #475569; }

  /* Revenue row */
  .revenue-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  /* Alert banner */
  .alert-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .alert-banner .icon { font-size: 18px; flex-shrink: 0; }
  .alert-banner .text { font-size: 13px; color: #fca5a5; font-weight: 500; }

  /* Loading */
  .loading { text-align: center; padding: 60px 20px; color: #475569; font-size: 13px; }
  .loading .spinner { font-size: 24px; margin-bottom: 8px; animation: spin 1s linear infinite; display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .footer { text-align: center; font-size: 11px; color: #334155; margin-top: 40px; }
  .footer a { color: #475569; text-decoration: none; }
  .footer a:hover { color: #94a3b8; }

  /* Leo Actions */
  .leo-actions { background: rgba(15,23,42,0.6); border: 1px solid rgba(148,163,184,0.08); border-radius: 10px; padding: 12px 14px; }
  .leo-action-item { font-size: 12px; color: #64748b; padding: 4px 0; line-height: 1.4; display: flex; align-items: flex-start; gap: 8px; }
  .leo-action-item::before { content: "💙"; font-size: 11px; flex-shrink: 0; margin-top: 1px; }

  @media (max-width: 600px) {
    .hero-grid { grid-template-columns: 1fr 1fr; }
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
    .scorecard-grid { grid-template-columns: 1fr; }
    .rep-grid { grid-template-columns: 1fr; }
    .dash-grid { grid-template-columns: 1fr; }
    .revenue-row { grid-template-columns: repeat(2, 1fr); }
    body { padding: 14px 12px 40px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">
    <span class="spinner">⏳</span>
    Loading morning brief...
  </div>
</div>

<script>
const BASE = '..';
const DATA = BASE + '/data';

function fmt(n, prefix='$', dash='—') {
  if (n == null || n === '' || n === undefined) return dash;
  const v = parseFloat(n);
  if (isNaN(v)) return dash;
  if (prefix === '$') {
    if (v >= 1000) return '$' + Math.round(v).toLocaleString();
    return '$' + v.toFixed(0);
  }
  return v.toLocaleString();
}

function fmtPct(n, dash='—') {
  if (n == null || n === '' || n === undefined) return dash;
  return parseFloat(n).toFixed(1) + '%';
}

function trendClass(t) {
  if (!t) return '';
  const s = t.toLowerCase();
  if (s.includes('up') || s.includes('increas')) return 'up';
  if (s.includes('declin')) return 'declining';
  return 'holding';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadJSON(path) {
  try {
    const r = await fetch(path + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e) {
    return null;
  }
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    return d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  } catch(e) { return isoStr; }
}

function formatTime(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'Australia/Melbourne' }) + ' AEST';
  } catch(e) { return ''; }
}

async function render() {
  const [dash, lab, scorecard, reps] = await Promise.all([
    loadJSON(DATA + '/dashboard-data.json'),
    loadJSON(DATA + '/morning-lab.json'),
    loadJSON(DATA + '/scorecard.json'),
    loadJSON(DATA + '/rep-stats.json'),
  ]);

  const today = scorecard
    ? new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Australia/Melbourne' })
    : new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const genTime = dash ? formatTime(dash.generated) : '';

  // ── Revenue at risk alert ──
  let alertHtml = '';
  if (dash && dash.revenue_at_risk && dash.revenue_at_risk > 800) {
    alertHtml = `<div class="alert-banner"><span class="icon">🚨</span><span class="text">Revenue at risk: ${fmt(dash.revenue_at_risk)} — ${dash.failed_past_due || 0} failed / past-due payments need attention</span></div>`;
  }

  // ── Hero metrics ──
  const heroHtml = `
    <div class="hero-grid">
      <div class="hero-card">
        <div class="label">Active Families</div>
        <div class="value">${dash ? dash.active_families || '—' : '—'}</div>
        <div class="sub">of ${dash ? dash.active_total || '—' : '—'} total (${dash ? dash.paused || 0 : 0} paused)</div>
      </div>
      <div class="hero-card" style="${dash && dash.revenue_at_risk > 800 ? 'border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.05)' : ''}">
        <div class="label">Revenue at Risk</div>
        <div class="value" style="${dash && dash.revenue_at_risk > 800 ? 'color:#f87171' : ''}">${dash ? fmt(dash.revenue_at_risk) : '—'}</div>
        <div class="sub">${dash ? (dash.failed_past_due || 0) : 0} payments flagged</div>
      </div>
      <div class="hero-card">
        <div class="label">MRR</div>
        <div class="value">${dash ? fmt(dash.mrr) : '—'}</div>
        <div class="sub">normalised</div>
      </div>
      <div class="hero-card">
        <div class="label">Cash (7d)</div>
        <div class="value">${dash ? fmt(dash.cash_7d) : '—'}</div>
        <div class="sub">real Stripe charges</div>
      </div>
    </div>`;

  // ── Secondary metrics ──
  const ltb = dash && dash.lead_to_booked;
  const secondaryHtml = `
    <div class="metric-grid">
      <div class="metric-card">
        <div class="label">CPBC (MTD)</div>
        <div class="value" style="${dash && dash.cpbc_mtd > 40 ? 'color:#f87171' : dash && dash.cpbc_mtd > 35 ? 'color:#fbbf24' : 'color:#4ade80'}">${dash ? fmt(dash.cpbc_mtd) : '—'}</div>
        <div class="sub">${dash && dash.cpbc_mtd > 40 ? '🚨 Critical' : dash && dash.cpbc_mtd > 35 ? '⚠️ High' : '✓ On target'}</div>
      </div>
      <div class="metric-card">
        <div class="label">Booked Calls (MTD)</div>
        <div class="value">${dash ? (dash.booked_calls_mtd || '—') : '—'}</div>
        <div class="sub">Meta spend: ${dash ? fmt(dash.meta_spend_mtd) : '—'}</div>
      </div>
      <div class="metric-card">
        <div class="label">Lead → Booked</div>
        <div class="value" style="${ltb && ltb.rate_7d < 15 ? 'color:#f87171' : 'color:#e2e8f0'}">${ltb ? fmtPct(ltb.rate_7d) : '—'}</div>
        <div class="sub">${ltb ? ltb.booked_7d + '/' + ltb.leads_7d + ' leads (7d)' : ''} <span style="color:${ltb && ltb.trend === 'up' ? '#4ade80' : '#f87171'}">${ltb && ltb.trend === 'up' ? '↑' : '↓'}</span></div>
      </div>
      <div class="metric-card">
        <div class="label">Xero Receivable</div>
        <div class="value">${dash ? fmt(dash.xero_receivable) : '—'}</div>
        <div class="sub">Payable: ${dash ? fmt(dash.xero_payable) : '—'}</div>
      </div>
      <div class="metric-card">
        <div class="label">Stripe Balance</div>
        <div class="value">${dash ? fmt(dash.balance_available) : '—'}</div>
        <div class="sub">Available · Pending: ${dash ? fmt(dash.balance_pending) : '—'}</div>
      </div>
      <div class="metric-card">
        <div class="label">4-Wk Forecast</div>
        <div class="value">${dash ? fmt(dash.forecast_4wk) : '—'}</div>
        <div class="sub">NDIS: ${dash ? fmt(dash.ndis_total) : '—'}</div>
      </div>
    </div>`;

  // ── One Thing ──
  const oneThing = scorecard ? escHtml(scorecard.one_thing_tomorrow || scorecard.one_thing || '—') : '—';
  const oneThingHtml = `
    <div class="one-thing">
      <div class="label">Today's ONE THING</div>
      <div class="text">${oneThing}</div>
    </div>`;

  // ── Scorecard ──
  let scorecardHtml = '<div class="scorecard-grid"><div style="color:#475569;font-size:12px;grid-column:1/-1">Scorecard loading...</div></div>';
  if (scorecard) {
    const wins = (scorecard.wins || []).map(w => `<li>${escHtml(w)}</li>`).join('');
    const misses = (scorecard.misses || []).map(m => `<li>${escHtml(m)}</li>`).join('');
    const carries = (scorecard.carry_forwards || []).map(c => `<li>${escHtml(c)}</li>`).join('');
    scorecardHtml = `
      <div class="scorecard-grid">
        <div class="scorecard-col wins">
          <div class="col-title">✅ Wins</div>
          <ul>${wins || '<li style="color:#475569">None logged</li>'}</ul>
        </div>
        <div class="scorecard-col misses">
          <div class="col-title">❌ Misses</div>
          <ul>${misses || '<li style="color:#475569">None logged</li>'}</ul>
        </div>
        <div class="scorecard-col carry">
          <div class="col-title">➡️ Carry Forward</div>
          <ul>${carries || '<li style="color:#475569">Nothing pending</li>'}</ul>
        </div>
      </div>`;
  }

  // ── Leo's Lab ──
  let labHtml = '<div style="color:#475569;font-size:12px">Lab loading...</div>';
  if (lab && lab.items) {
    labHtml = lab.items.map((item, i) => `
      <div class="lab-item" onclick="toggleLab(${i})">
        <div class="lab-header">
          <div class="lab-emoji">${escHtml(item.emoji || '💡')}</div>
          <div class="lab-content">
            <div class="lab-headline">${escHtml(item.headline)}</div>
            <span class="lab-tag ${escHtml(item.tag || '')}">${escHtml(item.tag || item.type || 'insight')}</span>
          </div>
          <div class="lab-chevron" id="chev-${i}">›</div>
        </div>
        <div class="lab-detail" id="detail-${i}">${escHtml(item.detail || '')}</div>
      </div>`).join('');

    if (lab.leo_actions && lab.leo_actions.length > 0) {
      labHtml += `<div class="leo-actions">${lab.leo_actions.map(a => `<div class="leo-action-item">${escHtml(a)}</div>`).join('')}</div>`;
    }
  }

  // ── DC Reps ──
  let repsHtml = '<div style="color:#475569;font-size:12px">Rep stats loading...</div>';
  if (reps && reps.reps) {
    const repCards = Object.entries(reps.reps).map(([key, rep]) => {
      const p3 = rep.p3_flag ? '<span class="flag">P3 FLAG</span>' : '';
      const closeRate = rep.this_week_calls > 0 ? rep.close_rate_this_week : (fmtPct(rep.close_rate) + ' rolling');
      const siel = rep.siel_avg ? rep.siel_avg.toFixed(1) : '—';
      const tc = trendClass(rep.trend);
      const pending = rep.pending && rep.pending.length > 0
        ? `<div style="font-size:11px;color:#fbbf24;margin-top:4px;">Pending: ${rep.pending.map(p => escHtml(p)).join(', ')}</div>` : '';
      return `
        <div class="rep-card ${rep.p3_flag ? 'p3-flag' : ''}">
          <div class="rep-name">${escHtml(key.charAt(0).toUpperCase() + key.slice(1))} ${p3}</div>
          <div class="rep-stats">
            <div class="rep-stat rep-close-rate">
              <div class="val">${closeRate}</div>
              <div class="lbl">Close rate</div>
            </div>
            <div class="rep-stat rep-siel">
              <div class="val">${siel}</div>
              <div class="lbl">SIEL avg</div>
            </div>
            <div class="rep-stat">
              <div class="val" style="font-size:14px">${rep.calls_scored || 0}</div>
              <div class="lbl">Calls scored</div>
            </div>
          </div>
          <div class="rep-trend ${tc}">Trend: ${escHtml(rep.trend || 'unknown')}</div>
          ${rep.improvement_area ? `<div class="rep-improvement">Focus: ${escHtml(rep.improvement_area.substring(0, 80))}${rep.improvement_area.length > 80 ? '…' : ''}</div>` : ''}
          ${pending}
        </div>`;
    }).join('');
    repsHtml = `<div class="rep-grid">${repCards}</div>`;
  }

  // ── Dashboard links ──
  const links = [
    { icon: '🏠', name: 'Mission Control', desc: 'Main dashboard — pulse & tabs', href: 'https://bluesandgreens.github.io/bg-mission-control/' },
    { icon: '💙', name: 'Parent Calls', desc: "Today's call list — saves, debriefs, check-ins", href: 'https://bluesandgreens.github.io/bg-mission-control/parent-calls/' },
    { icon: '🎯', name: "Founder's Hitlist", desc: 'Top accounts & action board', href: 'https://bluesandgreens.github.io/bg-mission-control/founders-hitlist/' },
    { icon: '🧑‍🤝‍🧑', name: 'Mentor Pipeline', desc: 'Applicants by stage, all schools', href: 'https://bluesandgreens.github.io/bg-mission-control/mentor-pipeline/' },
    { icon: '🎓', name: 'Mentor Onboarding', desc: 'Screened → active mentor tracker', href: 'https://bluesandgreens.github.io/bg-mission-control/mentor-onboarding/' },
    { icon: '🎙️', name: 'DC Training Hub', desc: 'Call library — 86 calls, 63 playable', href: 'https://bg-dc-hub.lovable.app' },
    { icon: '📋', name: 'Parent Portal', desc: 'Family onboarding portal', href: 'https://bluesandgreens.lovable.app' },
  ];
  const dashHtml = `<div class="dash-grid">${links.map(l => `
    <a href="${l.href}" target="_blank" class="dash-link">
      <span class="icon">${l.icon}</span>
      <div class="info">
        <div class="name">${escHtml(l.name)}</div>
        <div class="desc">${escHtml(l.desc)}</div>
      </div>
      <span class="arrow">›</span>
    </a>`).join('')}</div>`;

  // ── Assemble ──
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <h1>☀️ Morning Brief</h1>
        <div class="tagline">Blues &amp; Greens · ${today}${genTime ? ' · Data at ' + genTime : ''}</div>
      </div>
      <div class="header-right">
        <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
      </div>
    </div>

    ${alertHtml}

    <div class="section">
      <div class="section-title">Business Pulse</div>
      ${heroHtml}
      ${secondaryHtml}
    </div>

    <div class="section">
      ${oneThingHtml}
    </div>

    <div class="section">
      <div class="section-title">Yesterday's Scorecard</div>
      ${scorecardHtml}
    </div>

    <div class="section">
      <div class="section-title">Leo's Lab — What I Found</div>
      ${labHtml}
    </div>

    <div class="section">
      <div class="section-title">DC Rep Scorecard</div>
      ${repsHtml}
    </div>

    <div class="section">
      <div class="section-title">Quick Links</div>
      ${dashHtml}
    </div>

    <div class="footer">
      <p>Blues &amp; Greens Morning Brief · Data refreshes each morning 6:30am AEST</p>
      <p style="margin-top:4px">
        <a href="https://bluesandgreens.github.io/bg-mission-control/">← Mission Control</a>
      </p>
    </div>`;
}

function toggleLab(i) {
  const item = document.querySelectorAll('.lab-item')[i];
  item.classList.toggle('expanded');
}

render();
</script>
