<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Blues & Greens - Morning Mission Control</title>
<meta name="theme-color" content="#104791">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;--green-bright:#4CAF50;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3040;border-radius:3px;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(10,14,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,169,81,0.3);gap:8px;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-logo{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--navy);}
.nav-logo a{color:var(--navy);text-decoration:none;}
.nav-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-clock{font-size:12px;color:rgba(251,248,243,0.4);font-variant-numeric:tabular-nums;}

/* TAB TOGGLE */
.view-toggle{display:flex;background:rgba(255,255,255,0.06);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
.view-btn{padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:rgba(251,248,243,0.5);transition:all 0.2s;white-space:nowrap;}
.view-btn.active{background:var(--gold);color:var(--dark);}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:16px 16px 100px;}

/* PULSE */
.pulse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.pulse-card{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 12px;text-align:center;transition:border-color 0.2s;}
.pulse-card:hover{border-color:rgba(200,169,81,0.25);}
.pulse-card.highlight{border-color:rgba(200,169,81,0.3);}
.pulse-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.pulse-val{font-family:'Archivo Black',sans-serif;font-size:22px;line-height:1.2;}
.pulse-trend{font-size:11px;margin-top:2px;}
.pulse-sub{font-size:9px;color:rgba(251,248,243,0.3);margin-top:2px;}
.trend-up{color:var(--green-bright);}
.trend-down{color:var(--red);}
.trend-flat{color:rgba(251,248,243,0.4);}

.pulse-summary{font-size:12px;color:rgba(251,248,243,0.5);text-align:center;padding:8px 0 20px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:20px;}
.pulse-summary strong{color:var(--cream);}

/* SECTIONS */
.section{margin-bottom:12px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);background:rgba(16,21,32,0.6);}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;transition:background 0.15s;}
.section-head:hover{background:rgba(255,255,255,0.02);}
.section-head-left{display:flex;align-items:center;gap:10px;}
.section-icon{font-size:16px;}
.section-title{font-family:'Archivo Black',sans-serif;font-size:13px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;}
.section-preview{font-size:11px;color:rgba(251,248,243,0.4);margin-left:8px;}
.section-chevron{font-size:12px;color:rgba(251,248,243,0.3);transition:transform 0.3s ease;}
.section-chevron.open{transform:rotate(180deg);}
.section-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease;}
.section-body.open{max-height:5000px;}
.section-content{padding:0 16px 16px;}

/* LEO'S LAB special */
.section.leo-lab{background:linear-gradient(135deg,rgba(200,169,81,0.06),rgba(16,21,32,0.8));border-color:rgba(200,169,81,0.15);}
.leo-greeting{font-size:18px;color:var(--cream);margin-bottom:16px;font-weight:300;}
.leo-greeting strong{font-weight:700;color:var(--gold);}
.leo-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;}
.leo-item:hover{border-color:rgba(200,169,81,0.2);background:rgba(255,255,255,0.05);}
.leo-item-num{font-family:'Archivo Black',sans-serif;font-size:11px;color:var(--gold);margin-bottom:6px;}
.leo-item-text{font-size:13px;color:rgba(251,248,243,0.7);line-height:1.6;}
.leo-item-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);font-size:12px;color:rgba(251,248,243,0.5);line-height:1.5;}
.leo-item-detail.show{display:block;}

/* METRIC ROWS */
.metric-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.metric-row.triple{grid-template-columns:repeat(3,1fr);}
.mini-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;}
.mini-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(251,248,243,0.4);margin-bottom:4px;}
.mini-val{font-family:'Archivo Black',sans-serif;font-size:18px;}
.mini-sub{font-size:10px;color:rgba(251,248,243,0.3);margin-top:2px;}

/* REP CARDS */
.rep-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.2s;}
.rep-card:hover{border-color:rgba(200,169,81,0.25);}
.rep-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.rep-name{font-size:14px;font-weight:700;}
.rep-status{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px;}
.rep-status.active{background:rgba(76,175,80,0.2);color:var(--green-bright);}
.rep-status.coaching{background:rgba(232,160,48,0.2);color:var(--amber);}
.rep-status.exited{background:rgba(255,255,255,0.06);color:rgba(251,248,243,0.4);}
.rep-status.commission{background:rgba(224,82,82,0.2);color:var(--red);}
.rep-stats{display:flex;gap:16px;font-size:11px;color:rgba(251,248,243,0.5);}
.rep-stats span{display:flex;align-items:center;gap:3px;}
.rep-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);font-size:12px;color:rgba(251,248,243,0.5);line-height:1.5;}
.rep-detail.show{display:block;}

/* FLAGS */
.flag-card{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;font-size:12px;line-height:1.4;}
.flag-red{background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.15);}
.flag-amber{background:rgba(232,160,48,0.08);border:1px solid rgba(232,160,48,0.15);}
.flag-icon{font-size:14px;flex-shrink:0;padding-top:1px;}

/* OBJECTION ROW */
.obj-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
.obj-row:last-child{border-bottom:none;}
.obj-rank{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--gold);min-width:24px;}
.obj-cat{font-weight:600;flex:1;}
.obj-count{color:rgba(251,248,243,0.4);}
.obj-grade{font-weight:700;padding:2px 8px;border-radius:6px;font-size:10px;}

/* CASHFLOW */
.cf-day{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
.cf-day:last-child{border-bottom:none;}
.cf-date{font-weight:600;min-width:100px;}
.cf-charges{color:rgba(251,248,243,0.4);}
.cf-amount{font-family:'Archivo Black',sans-serif;color:var(--gold);}

/* FUNNEL */
.funnel{display:flex;align-items:center;justify-content:center;gap:4px;padding:16px 0;flex-wrap:wrap;}
.funnel-stage{text-align:center;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);min-width:70px;}
.funnel-val{font-family:'Archivo Black',sans-serif;font-size:16px;}
.funnel-lbl{font-size:9px;color:rgba(251,248,243,0.4);text-transform:uppercase;letter-spacing:1px;}
.funnel-arrow{font-size:14px;color:rgba(251,248,243,0.2);}
.funnel-pct{font-size:10px;color:var(--gold);font-weight:700;}

/* CONSTRAINT CARDS */
.constraint-input-wrap{margin-bottom:20px;}
.constraint-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 16px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.constraint-input:focus{border-color:var(--gold);}
.constraint-input::placeholder{color:rgba(251,248,243,0.3);}
.constraint-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
.c-card{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;transition:border-color 0.2s;}
.c-card:hover{border-color:rgba(200,169,81,0.2);}
.c-card-fn{font-family:'Archivo Black',sans-serif;font-size:12px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.c-card-owner{font-size:11px;color:rgba(251,248,243,0.4);margin-bottom:10px;}
.c-card-constraint{font-size:12px;color:rgba(251,248,243,0.6);margin-bottom:8px;line-height:1.4;padding:8px 10px;background:rgba(224,82,82,0.06);border-radius:8px;border-left:3px solid var(--red);}
.c-card-task{font-size:11px;color:rgba(251,248,243,0.5);line-height:1.4;}
.c-card-task strong{color:var(--gold);}

/* OWNERSHIP MAP */
.own-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.own-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.own-status{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.own-status.green{background:var(--green-bright);}
.own-status.amber{background:var(--amber);}
.own-status.red{background:var(--red);}
.own-info{flex:1;}
.own-fn{font-size:12px;font-weight:700;}
.own-name{font-size:10px;color:rgba(251,248,243,0.4);}
.own-metric{font-size:11px;font-weight:600;color:var(--gold);}

/* PLACEHOLDER */
.placeholder{text-align:center;padding:24px 16px;color:rgba(251,248,243,0.3);font-size:13px;font-style:italic;}

/* THOUGHT BUTTON */
.thought-btn{position:fixed;bottom:24px;right:24px;z-index:90;width:52px;height:52px;border-radius:50%;background:var(--gold);border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(200,169,81,0.3);transition:all 0.2s;}
.thought-btn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(200,169,81,0.4);}

/* THOUGHT MODAL */
.thought-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:500;display:none;align-items:flex-end;justify-content:center;padding:16px;}
.thought-overlay.open{display:flex;}
.thought-box{background:#141924;border:1px solid rgba(200,169,81,0.25);border-radius:16px;padding:20px;width:100%;max-width:440px;margin-bottom:60px;animation:slideUp 0.2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.thought-title{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--gold);margin-bottom:12px;}
.thought-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none;min-height:60px;}
.thought-input:focus{border-color:var(--gold);}
.thought-input::placeholder{color:rgba(251,248,243,0.3);}
.thought-hint{font-size:10px;color:rgba(251,248,243,0.25);margin-top:6px;}
.thought-list{margin-top:12px;max-height:200px;overflow-y:auto;}
.thought-item{font-size:12px;color:rgba(251,248,243,0.5);padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.thought-item:last-child{border-bottom:none;}
.thought-item-time{font-size:10px;color:rgba(251,248,243,0.25);margin-bottom:2px;}

/* VIEW PANELS */
.view-panel{display:none;}
.view-panel.active{display:block;}

/* SECTION LABEL */
.section-label{font-family:'Archivo Black',sans-serif;font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(200,169,81,0.15);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gold);color:var(--dark);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:2000;transition:transform 0.3s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.hidden{display:none!important;}

/* RESPONSIVE */
@media(max-width:600px){
  .pulse-grid{grid-template-columns:repeat(2,1fr);}
  .constraint-grid{grid-template-columns:1fr;}
  .own-grid{grid-template-columns:1fr;}
  .metric-row{grid-template-columns:1fr;}
  .metric-row.triple{grid-template-columns:repeat(2,1fr);}
  .funnel{flex-direction:column;gap:2px;}
  .funnel-arrow{transform:rotate(90deg);}
  .section-preview{display:none;}
}
@media(min-width:601px) and (max-width:800px){
  .pulse-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-left">
    <div class="nav-logo"><a href="../">B&G</a></div>
    <div class="nav-title">Morning Brief</div>
  </div>
  <div class="nav-right">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-dashboard" onclick="setView('dashboard')">Dashboard</button>
      <button class="view-btn" id="btn-constraints" onclick="setView('constraints')">Constraints</button>
    </div>
    <div class="nav-clock" id="clock"></div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

<!-- ===== DASHBOARD VIEW ===== -->
<div class="view-panel active" id="view-dashboard">

<!-- THE PULSE -->
<div class="section-label" style="margin-top:8px;">The Pulse</div>
<div class="pulse-grid" id="pulse-grid"></div>
<div class="pulse-summary" id="pulse-summary"></div>

<!-- SECTIONS -->
<div id="sections-container"></div>

</div><!-- /dashboard -->

<!-- ===== CONSTRAINTS VIEW ===== -->
<div class="view-panel" id="view-constraints">

<div class="section-label" style="margin-top:8px;">What's On Your Mind?</div>
<div class="constraint-input-wrap">
  <input type="text" class="constraint-input" id="constraint-input" placeholder="What are you working on today?" />
</div>

<div class="section-label">Current Constraints by Function</div>
<div class="constraint-grid" id="constraint-grid"></div>

<div class="section-label">Ownership Map</div>
<div class="own-grid" id="ownership-grid"></div>

</div><!-- /constraints -->

</div><!-- /main -->

<!-- THOUGHT BUTTON -->
<button class="thought-btn" onclick="toggleThought()" title="Quick capture">💭</button>

<!-- THOUGHT MODAL -->
<div class="thought-overlay" id="thought-overlay" onclick="closeThoughtOutside(event)">
  <div class="thought-box">
    <div class="thought-title">What's on your mind?</div>
    <textarea class="thought-input" id="thought-input" placeholder="Type a thought, hit Enter..." rows="2"></textarea>
    <div class="thought-hint">Press Enter to save. Shift+Enter for new line.</div>
    <div class="thought-list" id="thought-list"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───
let D = {}; // dashboard-data
let R = {}; // rep-stats
let C = {}; // dc-calls
let I = {}; // insights
let CF = {}; // cashflow
let ML = {}; // morning-lab
let SC = {}; // scorecard
let OW = {}; // ownership

const DATA_BASE = '../data/';

async function loadData() {
  const [d, r, c, i, cf, ml, sc, ow] = await Promise.all([
    fetch(DATA_BASE + 'dashboard-data.json').then(r => r.json()).catch(() => ({})),
    fetch(DATA_BASE + 'rep-stats.json').then(r => r.json()).catch(() => ({})),
    fetch(DATA_BASE + 'dc-calls.json').then(r => r.json()).catch(() => ({})),
    fetch(DATA_BASE + 'insights.json').then(r => r.json()).catch(() => ({})),
    fetch(DATA_BASE + 'cashflow-detail.json').then(r => r.json()).catch(() => ({})),
    fetch(DATA_BASE + 'morning-lab.json').then(r => r.json()).catch(() => ({})),
    fetch(DATA_BASE + 'scorecard.json').then(r => r.json()).catch(() => ({})),
    fetch(DATA_BASE + 'ownership.json').then(r => r.json()).catch(() => ({})),
  ]);
  D = d; R = r; C = c; I = i; CF = cf; ML = ml; SC = sc; OW = ow;
  render();
}

// ─── HELPERS ───
function fmt$(n) { return '$' + Number(n||0).toLocaleString('en-AU', {minimumFractionDigits:0, maximumFractionDigits:0}); }
function fmtPct(n) { return Number(n||0).toFixed(1) + '%'; }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

// ─── RENDER ───
function render() {
  renderPulse();
  renderSections();
  renderConstraints();
  renderOwnership();
}

function renderPulse() {
  const grid = document.getElementById('pulse-grid');
  const closeRate = I.summary ? I.summary.overall_close_rate : 0;
  const cards = [
    { lbl: 'MRR', val: fmt$(D.mrr), trend: 'up', trendTxt: 'Up this month', sub: D.active_families + ' collecting families' },
    { lbl: 'Active Families', val: (D.active_families||0) + '/' + (D.active_total||0), trend: 'flat', trendTxt: (D.paused||0) + ' paused', sub: fmtPct(((D.active_families||0)/(D.active_total||1))*100) + ' active rate' },
    { lbl: 'Booked Calls MTD', val: D.booked_calls_mtd||0, trend: 'up', trendTxt: '192 this month', sub: 'Meta + organic' },
    { lbl: 'Close Rate', val: fmtPct(closeRate), trend: closeRate >= 40 ? 'up' : 'down', trendTxt: 'Rolling avg', sub: (I.summary ? I.summary.total_closes : 0) + ' closes / ' + (I.summary ? I.summary.total_scored : 0) + ' scored' },
    { lbl: 'CPBC', val: fmt$(D.cpbc_mtd), trend: D.cpbc_mtd < 30 ? 'up' : 'down', trendTxt: D.cpbc_mtd < 30 ? 'Below $30 target' : 'Above target', sub: fmt$(D.meta_spend_mtd) + ' Meta spend MTD' },
    { lbl: 'Stripe Balance', val: fmt$(D.balance_total), trend: 'flat', trendTxt: fmt$(D.balance_available) + ' available', sub: fmt$(D.balance_pending) + ' pending' },
  ];
  grid.innerHTML = cards.map((c, i) => `
    <div class="pulse-card${i===0?' highlight':''}">
      <div class="pulse-lbl">${c.lbl}</div>
      <div class="pulse-val">${c.val}</div>
      <div class="pulse-trend trend-${c.trend}">${c.trend==='up'?'↑':c.trend==='down'?'↓':'→'} ${c.trendTxt}</div>
      <div class="pulse-sub">${c.sub}</div>
    </div>
  `).join('');

  // Summary line
  const reps = R.reps || [];
  const lowE = reps.filter(r => r.e_score_avg < 2.5).map(r => r.rep);
  let summaryParts = [
    `<strong>${fmt$(D.mrr)}</strong> MRR`,
    `<strong>${D.failed_past_due||0}</strong> failed/past due`,
    `<strong>${fmt$(D.revenue_at_risk)}</strong> revenue at risk`,
  ];
  if (lowE.length) summaryParts.push(`<strong>${lowE.join(' & ')}</strong> need E-score coaching`);
  document.getElementById('pulse-summary').innerHTML = summaryParts.join(' · ');
}

function renderSections() {
  const container = document.getElementById('sections-container');
  const sections = [
    { id:'pipeline', icon:'🔄', title:'Pipeline', preview: getPipelinePreview, render: renderPipeline },
    { id:'dc-war', icon:'🎯', title:'DC War Room', preview: getDCPreview, render: renderDC },
    { id:'revenue', icon:'💰', title:'Revenue & Retention', preview: getRevenuePreview, render: renderRevenue },
    { id:'ads', icon:'📣', title:'Ads', preview: getAdsPreview, render: renderAds },

        </div>

          <div class="section-content" id="content-${s.id}"></div>
        </div>
      </div>
    `;
  }).join('');

  // Render content for each section
  sections.forEach(s => s.render());
}

function toggleSection(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const isOpen = body.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
  const saved = JSON.parse(localStorage.getItem('mc-section-states') || '{}');
  saved[id] = isOpen;
  localStorage.setItem('mc-section-states', JSON.stringify(saved));
}

// ─── THOUGHT CAPTURE ───
function toggleThought() {
  document.getElementById('thought-overlay').classList.toggle('open');
  if (document.getElementById('thought-overlay').classList.contains('open')) {
    document.getElementById('thought-input').focus();
    renderThoughts();
  }
}
function closeThoughtOutside(e) {
  if (e.target === e.currentTarget) toggleThought();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('thought-overlay').classList.remove('open');
  }
});

function getThoughts() {
  return JSON.parse(localStorage.getItem('mc-thoughts') || '[]');
}

function saveThought(text) {
  if (!text.trim()) return;
  const thoughts = getThoughts();
  thoughts.unshift({ text: text.trim(), ts: new Date().toISOString() });
  if (thoughts.length > 50) thoughts.length = 50;
  localStorage.setItem('mc-thoughts', JSON.stringify(thoughts));
  renderThoughts();
  showToast('Thought saved');
}

function renderThoughts() {
  const list = document.getElementById('thought-list');
  const thoughts = getThoughts().slice(0, 5);
  list.innerHTML = thoughts.length ? thoughts.map(t => {
    const d = new Date(t.ts);
    const timeStr = d.toLocaleDateString('en-AU', {day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('en-AU', {hour:'2-digit',minute:'2-digit'});
    return `<div class="thought-item"><div class="thought-item-time">${timeStr}</div>${escHtml(t.text)}</div>`;
  }).join('') : '<div style="font-size:11px;color:rgba(251,248,243,0.2);padding:8px 0;">No thoughts captured yet</div>';
}

document.getElementById('thought-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    saveThought(this.value);
    this.value = '';
  }
});

// Constraint input save
document.getElementById('constraint-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = this.value.trim();
    if (val) {
      localStorage.setItem('mc-today-focus', JSON.stringify({ text: val, ts: new Date().toISOString() }));
      showToast('Focus saved');
    }
  }
});
// Restore
const savedFocus = JSON.parse(localStorage.getItem('mc-today-focus') || 'null');
if (savedFocus) document.getElementById('constraint-input').value = savedFocus.text;

// ─── CLOCK ───
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ───
loadData();
</script>
</body>
</html>
