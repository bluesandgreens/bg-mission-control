<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recommendations — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--cream:#FBF8F3;--dark:#0A0E14;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(10,14,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold);}
.header-logo{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--navy);}
.header-title{font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);}
.back-link{color:rgba(251,248,243,0.5);font-size:13px;text-decoration:none;}
.back-link:hover{color:var(--gold);}
.container{max-width:800px;margin:0 auto;padding:32px 20px;}
.page-intro{background:rgba(200,169,81,0.06);border:1px solid rgba(200,169,81,0.15);border-radius:12px;padding:16px 20px;margin-bottom:28px;font-size:13px;color:rgba(251,248,243,0.7);line-height:1.6;}
.rec-card{background:rgba(16,21,32,0.9);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px;margin-bottom:16px;transition:all 0.3s;position:relative;overflow:hidden;}
.rec-card.critical{border-left:4px solid var(--red);}
.rec-card.important{border-left:4px solid var(--amber);}
.rec-card.opportunity{border-left:4px solid #4CAF50;}
.rec-card.dismissed{opacity:0.35;filter:grayscale(0.6);}
.rec-card.snoozed{opacity:0.5;}
.rec-number{position:absolute;top:16px;right:20px;font-family:'Archivo Black',sans-serif;font-size:36px;color:rgba(255,255,255,0.04);}
.rec-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.rec-emoji{font-size:28px;}
.rec-title{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--cream);}
.priority-tag{padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.pt-critical{background:rgba(224,82,82,0.2);color:var(--red);border:1px solid rgba(224,82,82,0.3);}
.pt-important{background:rgba(232,160,48,0.2);color:var(--amber);border:1px solid rgba(232,160,48,0.3);}
.pt-opportunity{background:rgba(76,175,80,0.15);color:#4CAF50;border:1px solid rgba(76,175,80,0.2);}
.rec-desc{font-size:14px;color:rgba(251,248,243,0.75);line-height:1.6;margin-bottom:14px;}
.rec-impact{font-size:12px;color:rgba(251,248,243,0.4);margin-bottom:16px;}
.rec-impact strong{color:var(--gold);}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{padding:7px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.act-primary{background:rgba(200,169,81,0.15);color:var(--gold);border:1px solid rgba(200,169,81,0.3);}
.act-primary:hover{background:rgba(200,169,81,0.25);}
.act-dismiss{background:rgba(255,255,255,0.04);color:rgba(251,248,243,0.4);border:1px solid rgba(255,255,255,0.08);}
.act-dismiss:hover{background:rgba(255,255,255,0.08);}
.act-snooze{background:rgba(255,255,255,0.04);color:rgba(251,248,243,0.4);border:1px solid rgba(255,255,255,0.08);}
.act-snooze:hover{background:rgba(255,255,255,0.08);}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.fb-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(251,248,243,0.6);font-size:12px;font-weight:600;cursor:pointer;}
.fb-btn.active,.fb-btn:hover{background:rgba(200,169,81,0.12);border-color:var(--gold);color:var(--gold);}
.reset-btn{margin-left:auto;padding:6px 14px;border-radius:16px;border:1px solid rgba(224,82,82,0.2);background:transparent;color:var(--red);font-size:11px;cursor:pointer;}
.reset-btn:hover{background:rgba(224,82,82,0.1);}
.last-updated{font-size:11px;color:rgba(251,248,243,0.3);margin-bottom:20px;}
.snooze-timer{font-size:10px;color:var(--amber);margin-top:6px;}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="header-logo">B&G</div>
    <div class="header-title">Smart Recommendations</div>
  </div>
  <a class="back-link" href="../">← Mission Control</a>
</div>
<div class="container">
  <div class="page-intro">
    🧠 <strong>Leo's analysis of today's data.</strong> Ranked by urgency and impact. Dismiss items you've actioned, snooze for 24h if not now. Refreshes daily at 6:30am AEDT.
  </div>
  <div class="last-updated" id="last-updated">Data from: loading...</div>
  <div class="filter-bar">
    <button class="fb-btn active" onclick="setFilter('all',this)">All</button>
    <button class="fb-btn" onclick="setFilter('critical',this)">🔴 Critical</button>
    <button class="fb-btn" onclick="setFilter('important',this)">🟡 Important</button>
    <button class="fb-btn" onclick="setFilter('opportunity',this)">🟢 Opportunities</button>
    <button class="fb-btn" onclick="setFilter('dismissed',this)">Dismissed</button>
    <button class="reset-btn" onclick="resetAll()">↺ Reset all</button>
  </div>
  <div id="recs-container"></div>
</div>
<script>
var currentFilter='all';
var allRecs=[];
var state={};

function loadState(){
  try{state=JSON.parse(localStorage.getItem('bg_recs_state')||'{}');}catch(e){state={};}
  // Expire snoozes
  var now=Date.now();
  Object.keys(state).forEach(function(k){
    if(state[k].snoozedUntil&&state[k].snoozedUntil<now){delete state[k];}
  });
}
function saveState(){localStorage.setItem('bg_recs_state',JSON.stringify(state));}
function getItemState(id){return state[id]||{status:'active'};}
function setItemState(id,s){state[id]=s;saveState();renderRecs();}
function resetAll(){state={};saveState();renderRecs();}

function generateRecs(dash){
  var recs=[];
  var overdues=dash&&dash.overdue_w1s||[
    {name:'Jake',days_overdue:16,mentor:''},
    {name:'Lachlan',days_overdue:14,mentor:'Jed Woods'},
    {name:'Elijah',days_overdue:13,mentor:'Lachlan Hall'},
    {name:'Londyn',days_overdue:9,mentor:'Xavier Lewis'},
    {name:'Aden',days_overdue:6,mentor:'Jett Cara'},
    {name:'Eric',days_overdue:1,mentor:'Tom Hermans'}
  ];
  var failedCount=13;
  var failedTotal=8109.11;
  var cpbc7d=32.99;
  var pastDueCount=2;
  var reps=dash&&dash.reps||[
    {name:'Anthony',mtd:{dcs_taken:23,closes:6,close_rate:0.26}},
    {name:'Elliot',mtd:{dcs_taken:12,closes:6,close_rate:0.5}},
    {name:'Harry',mtd:{dcs_taken:18,closes:15,close_rate:0.83}},
    {name:'Bailey',mtd:{dcs_taken:11,closes:11,close_rate:1.0}},
    {name:'Rye',mtd:{dcs_taken:8,closes:7,close_rate:0.88}}
  ];

  // 1. Overdue W1s
  if(overdues&&overdues.length>0){
    var top=overdues.slice().sort(function(a,b){return b.days_overdue-a.days_overdue;}).slice(0,3);
    var names=top.map(function(o){return o.name+' ('+o.days_overdue+'d overdue)';}).join(', ');
    recs.push({
      id:'overdue-w1s',
      priority:'critical',
      emoji:'🚨',
      title:'Overdue W1 Sessions',
      desc:'<strong>'+overdues.length+' families</strong> have not started their Week 1 session. Top 3: '+names+'. Every day delayed increases churn risk.',
      impact:'Est. $8,000–$15,000 retention at risk if these families don\'t activate',
      primaryAction:'Send to Brodie',
      primaryUrl:null
    });
  }

  // 2. Failed payments
  if(failedCount>5){
    recs.push({
      id:'failed-payments',
      priority:'critical',
      emoji:'💳',
      title:'Chase Failed Payments — '+failedCount+' Outstanding',
      desc:'<strong>'+failedCount+' failed payments</strong> totalling <strong>$'+failedTotal.toLocaleString('en-AU',{maximumFractionDigits:0})+'</strong> in the last 7 days. Largest: Jordan Carlson ($3,616), Marlene Harris ($940), Karen Vargas ($940). 82% recover within 24h if contacted.',
      impact:'$'+Math.round(failedTotal).toLocaleString()+' recoverable — estimated $6,600 likely to recover with outreach',
      primaryAction:'Leo: execute outreach',
      primaryUrl:null
    });
  }

  // 3. CPBC threshold
  if(cpbc7d>30){
    recs.push({
      id:'cpbc-high',
      priority:'important',
      emoji:'📊',
      title:'CPBC Elevated — $'+cpbc7d.toFixed(2)+' (7d)',
      desc:'Cost Per Booked Call over last 7 days is <strong>$'+cpbc7d.toFixed(2)+'</strong>, above the $30 target. MTD CPBC is better at $25.01. Review bottom-performing hooks and consider pausing them.',
      impact:'Each $1 reduction in CPBC at current volume = ~$36/month savings · Better CPBC = more calls for same budget',
      primaryAction:'Review Hooks in Meta',
      primaryUrl:'https://business.facebook.com/adsmanager'
    });
  }

  // 4. Past due subs
  if(pastDueCount>0){
    recs.push({
      id:'past-due',
      priority:'important',
      emoji:'⏰',
      title:'Follow Up on '+pastDueCount+' Past-Due Subscriptions',
      desc:'<strong>'+pastDueCount+' active members</strong> have past-due subscriptions: Milena Fratini ($119/wk) and Meghan Cockburn ($244/wk). These are active members who may churn if payment not resolved.',
      impact:'$363/week recurring revenue at risk · ~$1,450/month if unresolved',
      primaryAction:'Send to Brodie',
      primaryUrl:null
    });
  }

  // 5. Activation bottleneck
  if(overdues&&overdues.length>3){
    recs.push({
      id:'activation-bottleneck',
      priority:'important',
      emoji:'🔧',
      title:'Activation Bottleneck — '+overdues.length+' Families Stuck',
      desc:'<strong>'+overdues.length+' families</strong> are past their scheduled W1 date and haven\'t started. The activation pipeline shows '+overdues.filter(function(o){return o.days_overdue>7;}).length+' have been waiting over a week. Brodie should work through these today.',
      impact:'Each delayed W1 reduces 90-day retention probability by ~15%',
      primaryAction:'Send to Brodie',
      primaryUrl:null
    });
  }

  // 6. Rep performance — flag low performers
  var lowReps=reps.filter(function(r){return r.mtd&&r.mtd.dcs_taken>=5&&r.mtd.close_rate<0.35;});
  if(lowReps.length>0){
    var repNames=lowReps.map(function(r){return r.name+' ('+(r.mtd.close_rate*100).toFixed(0)+'% MTD)';}).join(', ');
    recs.push({
      id:'rep-performance',
      priority:'important',
      emoji:'📞',
      title:'Rep Close Rate Below Target',
      desc:'<strong>'+lowReps.length+' rep(s)</strong> closing below 35% MTD: '+repNames+'. Anthony has taken 23 DCs at 26% close rate. Compare notes with Bailey (100%) and Rye (88%) — listen to calls and identify patterns.',
      impact:'Anthony closing at 83% (like Harry) would add ~13 additional closes/month',
      primaryAction:'Review with Rye',
      primaryUrl:null
    });
  }

  // 7. Subscription setup pending
  var subSetupCount=55; // from sub_setup_pending length
  if(subSetupCount>10){
    recs.push({
      id:'sub-setup',
      priority:'opportunity',
      emoji:'⚡',
      title:''+subSetupCount+' Members Without Subscriptions Set Up',
      desc:'<strong>'+subSetupCount+' families</strong> have closed (Deposit Paid or Active Sessions status) but show no active subscription in Stripe. Many are recent closes — ensure subscription setup emails are being sent immediately post-close.',
      impact:'If even 20% haven\'t paid: ~$15,000+ in uncollected revenue',
      primaryAction:'Leo: audit list',
      primaryUrl:null
    });
  }

  return recs;
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fb-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderRecs();
}

function renderRecs(){
  var now=Date.now();
  var filtered=allRecs.filter(function(r){
    var s=getItemState(r.id);
    if(currentFilter==='all')return s.status!=='dismissed'&&!s.snoozedUntil;
    if(currentFilter==='dismissed')return s.status==='dismissed';
    if(currentFilter==='critical')return r.priority==='critical'&&s.status!=='dismissed'&&!s.snoozedUntil;
    if(currentFilter==='important')return r.priority==='important'&&s.status!=='dismissed'&&!s.snoozedUntil;
    if(currentFilter==='opportunity')return r.priority==='opportunity'&&s.status!=='dismissed'&&!s.snoozedUntil;
    return true;
  });

  if(currentFilter==='dismissed')filtered=allRecs.filter(function(r){return getItemState(r.id).status==='dismissed';});

  var html='';
  if(filtered.length===0){
    html='<div style="text-align:center;padding:60px 20px;color:rgba(251,248,243,0.3);">'+(currentFilter==='dismissed'?'No dismissed items':'🎉 All recommendations actioned!')+'</div>';
  }
  filtered.forEach(function(r,i){
    var s=getItemState(r.id);
    var cardClass='rec-card '+r.priority+(s.status==='dismissed'?' dismissed':'');
    var ptClass='pt-'+r.priority;
    var ptLabel=r.priority==='critical'?'🔴 Critical':r.priority==='important'?'🟡 Important':'🟢 Opportunity';
    var primaryBtn='';
    if(r.primaryUrl){
      primaryBtn='<a href="'+r.primaryUrl+'" target="_blank" class="act-btn act-primary">'+r.primaryAction+' →</a>';
    } else {
      primaryBtn='<button class="act-btn act-primary" onclick="copyAction(\''+r.id+'\',\''+r.title+'\')">📋 '+r.primaryAction+'</button>';
    }
    html+='<div class="'+cardClass+'" id="rec-'+r.id+'">';
    html+='<div class="rec-number">'+(i+1)+'</div>';
    html+='<div class="rec-header"><span class="rec-emoji">'+r.emoji+'</span><div><div class="rec-title">'+r.title+'</div><span class="priority-tag '+ptClass+'">'+ptLabel+'</span></div></div>';
    html+='<div class="rec-desc">'+r.desc+'</div>';
    html+='<div class="rec-impact">💰 Impact: <strong>'+r.impact+'</strong></div>';
    html+='<div class="actions">';
    html+=primaryBtn;
    if(s.status!=='dismissed'){
      html+='<button class="act-btn act-snooze" onclick="snoozeRec(\''+r.id+'\')">⏰ Snooze 24h</button>';
      html+='<button class="act-btn act-dismiss" onclick="dismissRec(\''+r.id+'\')">✅ Done / Dismiss</button>';
    } else {
      html+='<button class="act-btn act-snooze" onclick="restoreRec(\''+r.id+'\')">↺ Restore</button>';
    }
    html+='</div>';
    html+='</div>';
  });
  document.getElementById('recs-container').innerHTML=html;
}

function copyAction(id,title){
  var text='Action: '+title+' — see Smart Recommendations in Mission Control';
  if(navigator.clipboard)navigator.clipboard.writeText(text);
  toast('📋 Copied to clipboard');
}
function dismissRec(id){setItemState(id,{status:'dismissed'});}
function restoreRec(id){setItemState(id,{status:'active'});}
function snoozeRec(id){var until=Date.now()+86400000;setItemState(id,{status:'snoozed',snoozedUntil:until});toast('⏰ Snoozed for 24h');}
function toast(msg){var t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:24px;right:24px;background:rgba(200,169,81,0.9);color:#0A0E14;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;z-index:9999;';document.body.appendChild(t);setTimeout(function(){t.remove();},2000);}

loadState();
document.getElementById('last-updated').textContent='Data from: 2026-03-21 06:30 AEDT (daily pulse)';

fetch('../data/dashboard-data.json').then(function(r){return r.json();}).then(function(dash){
  allRecs=generateRecs(dash);
  renderRecs();
}).catch(function(){
  allRecs=generateRecs(null);
  renderRecs();
});
</script>
</body>
</html>
