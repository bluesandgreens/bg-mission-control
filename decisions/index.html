<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Log — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--gold:#C8A951;--green:#386217;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(10,14,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold);}
.header-left{display:flex;align-items:center;gap:12px;}
.header-logo{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--navy);}
.header-title{font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);}
.back-link{color:rgba(251,248,243,0.5);font-size:13px;text-decoration:none;}
.back-link:hover{color:var(--gold);}
.container{max-width:800px;margin:0 auto;padding:24px 16px 80px;}

/* STATS */
.stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.stat-pill{background:rgba(200,169,81,0.08);border:1px solid rgba(200,169,81,0.15);border-radius:10px;padding:10px 16px;font-size:13px;}
.stat-pill strong{color:var(--gold);}

/* FILTERS */
.filters{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{border:none;background:rgba(255,255,255,0.06);color:rgba(251,248,243,0.5);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.filter-btn.active{background:var(--gold);color:var(--dark);}
.filter-btn:hover{background:rgba(255,255,255,0.1);}

/* TIMELINE */
.timeline{position:relative;padding-left:20px;}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:rgba(200,169,81,0.15);}
.decision{position:relative;margin-bottom:16px;padding-left:16px;}
.decision::before{content:'';position:absolute;left:-17px;top:8px;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid var(--dark);}
.d-date{font-size:11px;color:rgba(251,248,243,0.3);margin-bottom:4px;}
.d-text{font-size:14px;font-weight:700;margin-bottom:4px;}
.d-context{font-size:12px;color:rgba(251,248,243,0.4);margin-bottom:6px;}
.d-meta{display:flex;gap:6px;flex-wrap:wrap;}
.pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.pill-strategy{background:rgba(16,71,145,0.2);color:#5a9fd4;}
.pill-product{background:rgba(200,169,81,0.15);color:var(--gold);}
.pill-team{background:rgba(56,98,23,0.2);color:#7cb342;}
.pill-operations{background:rgba(232,160,48,0.15);color:var(--amber);}
.pill-data{background:rgba(255,255,255,0.06);color:rgba(251,248,243,0.5);}
.pill-personal{background:rgba(128,0,128,0.15);color:#c580c5;}
.outcome{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.outcome-done{background:rgba(76,175,80,0.15);color:#4CAF50;}
.outcome-active{background:rgba(200,169,81,0.15);color:var(--gold);}
.outcome-pending{background:rgba(232,160,48,0.15);color:var(--amber);}
.outcome-null{background:rgba(255,255,255,0.04);color:rgba(251,248,243,0.3);}

/* ADD FORM */
.add-btn{position:fixed;bottom:20px;right:20px;background:var(--gold);color:var(--dark);border:none;width:48px;height:48px;border-radius:50%;font-size:24px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(200,169,81,0.3);z-index:50;}
.add-form{display:none;background:var(--dark2);border:1px solid rgba(200,169,81,0.2);border-radius:16px;padding:20px;margin-bottom:24px;}
.add-form.open{display:block;}
.add-form input,.add-form select,.add-form textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;margin-bottom:10px;outline:none;}
.add-form input:focus,.add-form select:focus,.add-form textarea:focus{border-color:var(--gold);}
.add-form select option{background:var(--dark2);color:var(--cream);}
.form-actions{display:flex;gap:8px;}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-gold{background:var(--gold);color:var(--dark);}
.btn-ghost{background:rgba(255,255,255,0.06);color:rgba(251,248,243,0.6);}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo">B&G</div>
    <div class="header-title">Decision Log</div>
  </div>
  <a class="back-link" href="../">← Mission Control</a>
</div>

<div class="container">
  <div class="stats-row" id="stats"></div>
  
  <div class="add-form" id="add-form">
    <input type="text" id="f-decision" placeholder="Decision...">
    <input type="text" id="f-context" placeholder="Context...">
    <select id="f-category">
      <option value="strategy">Strategy</option>
      <option value="product">Product</option>
      <option value="team">Team</option>
      <option value="operations">Operations</option>
      <option value="data">Data</option>
      <option value="personal">Personal</option>
    </select>
    <div class="form-actions">
      <button class="btn btn-gold" onclick="saveDecision()">Save</button>
      <button class="btn btn-ghost" onclick="document.getElementById('add-form').classList.remove('open')">Cancel</button>
    </div>
  </div>
  
  <div class="filters" id="filters"></div>
  <div class="timeline" id="timeline"></div>
</div>

<button class="add-btn" onclick="document.getElementById('add-form').classList.toggle('open')">+</button>

<script>
let decisions = [];
let activeFilter = 'all';

async function init() {
  const res = await fetch('../data/decisions.json').catch(()=>null);
  if(res) {
    const data = await res.json();
    decisions = data.decisions || [];
  }
  // Merge localStorage decisions
  const local = JSON.parse(localStorage.getItem('mc_decisions') || '[]');
  decisions = [...local, ...decisions];
  
  renderFilters();
  renderTimeline();
  renderStats();
}

function renderStats() {
  const now = new Date();
  const weekAgo = new Date(now - 7*86400000);
  const thisWeek = decisions.filter(d => new Date(d.date) >= weekAgo).length;
  const tracked = decisions.filter(d => d.outcome).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-pill"><strong>${thisWeek}</strong> decisions this week</div>
    <div class="stat-pill"><strong>${tracked}</strong> with outcomes tracked</div>
    <div class="stat-pill"><strong>${decisions.length}</strong> total</div>
  `;
}

function renderFilters() {
  const cats = ['all','strategy','product','team','operations','data','personal'];
  document.getElementById('filters').innerHTML = cats.map(c => 
    `<button class="filter-btn${c===activeFilter?' active':''}" onclick="setFilter('${c}')">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`
  ).join('');
}

function setFilter(f) {
  activeFilter = f;
  renderFilters();
  renderTimeline();
}

function renderTimeline() {
  const filtered = activeFilter === 'all' ? decisions : decisions.filter(d => d.category === activeFilter);
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));
  
  document.getElementById('timeline').innerHTML = sorted.map(d => {
    const outcomeClass = !d.outcome ? 'outcome-null' : 
      d.outcome === 'done' ? 'outcome-done' :
      d.outcome === 'active' || d.outcome === 'tracking daily' ? 'outcome-active' : 'outcome-pending';
    const outcomeText = d.outcome || 'no outcome yet';
    
    return `<div class="decision">
      <div class="d-date">${d.date}</div>
      <div class="d-text">${d.decision}</div>
      <div class="d-context">${d.context}</div>
      <div class="d-meta">
        <span class="pill pill-${d.category}">${d.category}</span>
        <span class="outcome ${outcomeClass}">${outcomeText}</span>
      </div>
    </div>`;
  }).join('');
}

function saveDecision() {
  const decision = document.getElementById('f-decision').value.trim();
  if(!decision) return;
  const d = {
    date: new Date().toISOString().split('T')[0],
    decision,
    context: document.getElementById('f-context').value.trim(),
    category: document.getElementById('f-category').value,
    outcome: null
  };
  const local = JSON.parse(localStorage.getItem('mc_decisions') || '[]');
  local.unshift(d);
  localStorage.setItem('mc_decisions', JSON.stringify(local));
  decisions.unshift(d);
  document.getElementById('add-form').classList.remove('open');
  document.getElementById('f-decision').value = '';
  document.getElementById('f-context').value = '';
  renderTimeline();
  renderStats();
}

// Keyboard: Cmd+K
document.addEventListener('keydown', e => {
  if((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); location.href='../'; }
});

init();
</script>
</body>
</html>
