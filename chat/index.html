<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo Chat — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;}
.header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(10,14,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold);}
.header-logo{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--navy);letter-spacing:1px;}
.header-title{font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);}
.back-link{color:rgba(251,248,243,0.5);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;}
.back-link:hover{color:var(--gold);}
/* Chat layout */
.chat-wrap{flex:1;max-width:700px;width:100%;margin:0 auto;display:flex;flex-direction:column;padding:24px 20px 0;height:calc(100vh - 57px);}
/* Chat date header */
.chat-date-header{text-align:center;margin-bottom:20px;}
.chat-date-pill{display:inline-block;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:5px 16px;font-size:11px;color:rgba(251,248,243,0.4);letter-spacing:1px;}
/* Messages feed */
.messages{flex:1;overflow-y:auto;padding-bottom:16px;display:flex;flex-direction:column;gap:12px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
/* Message bubbles */
.msg{display:flex;gap:10px;max-width:85%;}
.msg.leo{align-self:flex-start;}
.msg.harry{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.msg.leo .msg-avatar{background:var(--deep-navy);border:2px solid rgba(16,71,145,0.4);}
.msg.harry .msg-avatar{background:rgba(200,169,81,0.2);border:2px solid rgba(200,169,81,0.3);font-size:11px;font-weight:700;color:var(--gold);}
.msg-content{display:flex;flex-direction:column;gap:4px;}
.msg.harry .msg-content{align-items:flex-end;}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.55;max-width:100%;}
.msg.leo .bubble{background:rgba(16,71,145,0.35);border:1px solid rgba(16,71,145,0.3);border-bottom-left-radius:4px;color:var(--cream);}
.msg.harry .bubble{background:rgba(200,169,81,0.18);border:1px solid rgba(200,169,81,0.25);border-bottom-right-radius:4px;color:var(--cream);}
.msg-time{font-size:10px;color:rgba(251,248,243,0.25);padding:0 4px;}
/* Typing indicator */
.typing-indicator{display:flex;align-items:center;gap:4px;padding:8px 12px;background:rgba(16,71,145,0.25);border-radius:16px;border-bottom-left-radius:4px;width:fit-content;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:rgba(251,248,243,0.4);animation:typingBounce 1.4s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typingBounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
/* Input area */
.input-area{background:rgba(10,14,20,0.95);border-top:1px solid rgba(255,255,255,0.08);padding:16px 0 20px;}
.input-row{display:flex;gap:10px;align-items:center;}
.chat-input{flex:1;background:rgba(16,21,32,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:12px 18px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.chat-input:focus{border-color:rgba(200,169,81,0.3);}
.chat-input::placeholder{color:rgba(251,248,243,0.25);}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.send-btn:hover{background:#d4b45e;transform:scale(1.05);}
.send-btn svg{width:18px;height:18px;fill:var(--dark);}
/* Sync notice */
.sync-notice{text-align:center;padding:8px 16px 0;font-size:11px;color:rgba(251,248,243,0.25);}
/* Saved messages */
.saved-msg{background:rgba(200,169,81,0.06);border:1px dashed rgba(200,169,81,0.2);}
/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(16,21,32,0.98);border:1px solid var(--gold);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--cream);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.3s;white-space:nowrap;}
.toast.show{opacity:1;}
@media(max-width:600px){.chat-wrap{padding:16px 12px 0;}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="header-logo">B&G</div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="header-title">Leo Chat</div>
      <div style="font-size:10px;color:rgba(251,248,243,0.3);letter-spacing:1px;">Recent highlights · Messages save for next sync</div>
    </div>
  </div>
  <a class="back-link" href="../">← Mission Control</a>
</div>

<div class="chat-wrap">
  <div class="chat-date-header">
    <span class="chat-date-pill" id="chat-date">Today</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <input class="chat-input" id="chat-input" placeholder="Message Leo..." onkeydown="handleKey(event)">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="sync-notice">Messages save locally — Leo reads on next check-in 💙</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var chatLog = [];
var savedMessages = JSON.parse(localStorage.getItem('mc-chat-pending') || '[]');

function formatDate(d) {
  return d.toLocaleDateString('en-AU', {timeZone:'Australia/Melbourne', weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

function renderMessages() {
  var feed = document.getElementById('messages');
  var html = '';

  chatLog.forEach(function(msg) {
    var isLeo = msg.role === 'leo';
    html += '<div class="msg ' + msg.role + '">';
    html += '<div class="msg-avatar">' + (isLeo ? '💙' : 'HQ') + '</div>';
    html += '<div class="msg-content">';
    html += '<div class="bubble">' + escapeHtml(msg.text) + '</div>';
    html += '<div class="msg-time">' + msg.time + '</div>';
    html += '</div>';
    html += '</div>';
  });

  // Show saved pending messages
  if (savedMessages.length > 0) {
    html += '<div style="text-align:center;font-size:11px;color:rgba(200,169,81,0.4);padding:8px 0;letter-spacing:1px;">— PENDING (not yet sent) —</div>';
    savedMessages.forEach(function(msg) {
      html += '<div class="msg harry">';
      html += '<div class="msg-avatar">HQ</div>';
      html += '<div class="msg-content">';
      html += '<div class="bubble saved-msg">' + escapeHtml(msg.text) + '</div>';
      html += '<div class="msg-time">' + msg.time + ' · pending</div>';
      html += '</div>';
      html += '</div>';
    });
  }

  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text) return;

  var now = new Date();
  var timeStr = now.toLocaleTimeString('en-AU', {timeZone:'Australia/Melbourne', hour:'2-digit', minute:'2-digit', hour12: false});

  var newMsg = {role: 'harry', text: text, time: timeStr};
  savedMessages.push(newMsg);
  localStorage.setItem('mc-chat-pending', JSON.stringify(savedMessages));

  input.value = '';
  renderMessages();
  showToast('💙 Message saved — Leo will see it on next check');

  // Show typing indicator briefly
  setTimeout(function() {
    var feed = document.getElementById('messages');
    var typingEl = document.createElement('div');
    typingEl.className = 'msg leo';
    typingEl.id = 'typing-indicator';
    typingEl.innerHTML = '<div class="msg-avatar">💙</div><div class="msg-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    feed.appendChild(typingEl);
    feed.scrollTop = feed.scrollHeight;
    setTimeout(function(){
      var t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }, 2000);
  }, 500);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 3000);
}

// Set date header
var now = new Date();
document.getElementById('chat-date').textContent = formatDate(now);

fetch('../data/chat-log.json').then(function(r){return r.json();}).then(function(d){
  chatLog = d.recent;
  renderMessages();
}).catch(function(){
  chatLog = [];
  renderMessages();
});
</script>
</body>
</html>
