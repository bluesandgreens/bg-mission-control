<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(10,14,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold);}
.header-logo{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--navy);letter-spacing:1px;}
.header-title{font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);}
.back-link{color:rgba(251,248,243,0.5);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;}
.back-link:hover{color:var(--gold);}
.container{max-width:1000px;margin:0 auto;padding:32px 20px;}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
.hero-card{background:rgba(16,21,32,0.8);border:1px solid rgba(200,169,81,0.15);border-radius:16px;padding:20px;border-top:3px solid var(--gold);}
.hero-val{font-family:'Archivo Black',sans-serif;font-size:32px;color:var(--cream);margin:8px 0 4px;}
.hero-lbl{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.hero-sub{font-size:11px;color:rgba(251,248,243,0.4);}
.section{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px;margin-bottom:24px;}
.section-title{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
/* Timeline */
.timeline-wrap{position:relative;padding-left:60px;}
.time-axis{position:absolute;left:0;top:0;bottom:0;width:48px;}
.time-label{position:absolute;font-size:10px;color:rgba(251,248,243,0.35);font-weight:600;transform:translateY(-50%);}
.timeline-grid{position:absolute;left:60px;right:0;top:0;bottom:0;pointer-events:none;}
.grid-line{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,0.04);}
.now-line{position:absolute;left:-8px;right:0;height:2px;background:var(--red);z-index:10;}
.now-dot{position:absolute;left:-12px;width:8px;height:8px;border-radius:50%;background:var(--red);top:50%;transform:translateY(-50%);}
.now-label{position:absolute;right:4px;top:-10px;font-size:9px;color:var(--red);font-weight:700;letter-spacing:1px;}
.event-block{position:absolute;left:4px;right:4px;border-radius:8px;padding:8px 10px;cursor:pointer;transition:all 0.2s ease;overflow:hidden;}
.event-block:hover{filter:brightness(1.15);transform:translateX(2px);}
.event-block.deep_work{background:rgba(16,71,145,0.7);border-left:3px solid var(--navy);}
.event-block.dc_call{background:rgba(200,169,81,0.2);border-left:3px solid var(--gold);}
.event-block.meeting{background:rgba(56,98,23,0.5);border-left:3px solid var(--green);}
.event-block.personal{background:rgba(232,239,226,0.1);border-left:3px solid var(--sage);}
.event-block.free{background:transparent;border:1px dashed rgba(255,255,255,0.2);border-left:3px dashed rgba(255,255,255,0.3);}
.event-block.done{opacity:0.5;}
.event-title{font-size:12px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-time-label{font-size:10px;color:rgba(251,248,243,0.5);margin-top:2px;}
.event-notes{font-size:10px;color:rgba(251,248,243,0.4);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Compact day list */
.compact-day{margin-bottom:20px;}
.compact-day-label{font-family:'Archivo Black',sans-serif;font-size:12px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.compact-event{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,0.03);}
.compact-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.compact-dot.deep_work{background:var(--navy);}
.compact-dot.dc_call{background:var(--gold);}
.compact-dot.meeting{background:var(--green);}
.compact-dot.personal{background:var(--sage);}
.compact-dot.free{background:rgba(255,255,255,0.2);}
.compact-time{font-size:11px;color:rgba(251,248,243,0.4);width:90px;flex-shrink:0;}
.compact-title{font-size:13px;color:var(--cream);}
/* Tooltip */
.tooltip{position:fixed;z-index:200;background:rgba(16,21,32,0.98);border:1px solid rgba(200,169,81,0.3);border-radius:10px;padding:12px 16px;max-width:260px;pointer-events:none;display:none;}
.tooltip-title{font-weight:700;font-size:13px;margin-bottom:6px;}
.tooltip-notes{font-size:12px;color:rgba(251,248,243,0.6);}
@media(max-width:600px){.hero-grid{grid-template-columns:repeat(2,1fr);}.container{padding:20px 12px;}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="header-logo">B&G</div>
    <div class="header-title">Calendar</div>
  </div>
  <a class="back-link" href="../">← Mission Control</a>
</div>
<div class="container">

<div class="hero-grid" id="hero-cards">
  <div class="hero-card">
    <div class="hero-lbl">Deep Work Today</div>
    <div class="hero-val" id="h-deepwork">—</div>
    <div class="hero-sub">Focused hours scheduled</div>
  </div>
  <div class="hero-card" style="border-top-color:var(--gold);">
    <div class="hero-lbl">DC Calls Today</div>
    <div class="hero-val" id="h-calls">—</div>
    <div class="hero-sub">Discovery calls booked</div>
  </div>
  <div class="hero-card" style="border-top-color:rgba(255,255,255,0.3);">
    <div class="hero-lbl">Free Block</div>
    <div class="hero-val" id="h-free">—</div>
    <div class="hero-sub">Unscheduled time</div>
  </div>
</div>

<div class="section">
  <div class="section-title">📅 TODAY'S SCHEDULE</div>
  <div id="timeline-container" style="position:relative;min-height:400px;"></div>
</div>

<div class="section" id="upcoming-section">
  <div class="section-title">📆 COMING UP</div>
  <div id="upcoming-days"></div>
</div>

</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tooltip-title"></div>
  <div class="tooltip-notes" id="tooltip-notes"></div>
</div>

<script>
var calData = null;

function parseTime(str) {
  var parts = str.split(':');
  return parseInt(parts[0]) + parseInt(parts[1]) / 60;
}

function timeDiff(start, end) {
  return parseTime(end) - parseTime(start);
}

function loadCalendar() {
  fetch('../data/calendar.json').then(function(r){return r.json();}).then(function(d){
    calData = d;
    renderToday(d.days[0]);
    renderUpcoming(d.days.slice(1));
    renderStats(d.days[0]);
  }).catch(function(e){ 
    document.getElementById('timeline-container').innerHTML = '<p style="color:rgba(251,248,243,0.4);text-align:center;padding:40px;">Calendar data unavailable</p>';
  });
}

function renderStats(day) {
  var deepMins = 0, calls = 0, freeMins = 0;
  day.events.forEach(function(ev) {
    var parts = ev.time.split('-');
    var startH = parseTime(parts[0]);
    var endH = parseTime(parts[1]);
    var dur = (endH - startH) * 60;
    if (ev.type === 'deep_work') deepMins += dur;
    if (ev.type === 'dc_call') calls++;
    if (ev.type === 'free') freeMins += dur;
  });
  document.getElementById('h-deepwork').textContent = (deepMins / 60).toFixed(1) + 'h';
  document.getElementById('h-calls').textContent = calls;
  document.getElementById('h-free').textContent = (freeMins / 60).toFixed(1) + 'h';
}

function renderToday(day) {
  var container = document.getElementById('timeline-container');
  var startHour = 8, endHour = 22;
  var totalHours = endHour - startHour;
  var pxPerHour = 56;
  var totalHeight = totalHours * pxPerHour;

  var html = '<div class="timeline-wrap" style="height:' + totalHeight + 'px;">';
  html += '<div class="time-axis">';
  for (var h = startHour; h <= endHour; h += 2) {
    var top = (h - startHour) * pxPerHour;
    var label = h === 0 ? '12am' : h < 12 ? h + 'am' : h === 12 ? '12pm' : (h - 12) + 'pm';
    html += '<div class="time-label" style="top:' + top + 'px;">' + label + '</div>';
  }
  html += '</div>';

  // Grid lines
  for (var h2 = startHour; h2 <= endHour; h2++) {
    var top2 = (h2 - startHour) * pxPerHour;
    html += '<div class="grid-line" style="top:' + top2 + 'px;left:60px;right:0;position:absolute;"></div>';
  }

  // Now line
  var now = new Date();
  var melbOpts = {timeZone:'Australia/Melbourne',hour:'numeric',minute:'numeric',hour12:false};
  var melbTime = now.toLocaleTimeString('en-AU',melbOpts);
  var nowParts = melbTime.split(':');
  var nowH = parseInt(nowParts[0]) + parseInt(nowParts[1]) / 60;
  if (nowH >= startHour && nowH <= endHour) {
    var nowTop = (nowH - startHour) * pxPerHour;
    var nowHHMM = (parseInt(nowParts[0]) % 12 || 12) + ':' + (nowParts[1].length < 2 ? '0' : '') + nowParts[1] + (parseInt(nowParts[0]) < 12 ? 'am' : 'pm');
    html += '<div class="now-line" style="top:' + nowTop + 'px;left:60px;"><div class="now-dot"></div><div class="now-label">NOW ' + nowHHMM + '</div></div>';
  }

  // Events
  day.events.forEach(function(ev, i) {
    var parts = ev.time.split('-');
    var startT = parseTime(parts[0]);
    var endT = parseTime(parts[1]);
    var top = (startT - startHour) * pxPerHour;
    var height = Math.max((endT - startT) * pxPerHour - 4, 24);
    var doneClass = ev.status === 'done' ? ' done' : '';
    html += '<div class="event-block ' + ev.type + doneClass + '" style="top:' + top + 'px;height:' + height + 'px;left:64px;" data-idx="' + i + '" onmouseenter="showTip(event,' + i + ')" onmouseleave="hideTip()">';
    html += '<div class="event-title">' + ev.title + '</div>';
    if (height > 32) html += '<div class="event-time-label">' + ev.time + '</div>';
    if (ev.notes && height > 48) html += '<div class="event-notes">' + ev.notes + '</div>';
    html += '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
  window._todayEvents = day.events;
}

function renderUpcoming(days) {
  var html = '';
  days.forEach(function(day) {
    html += '<div class="compact-day">';
    html += '<div class="compact-day-label">' + day.label + '</div>';
    day.events.forEach(function(ev) {
      html += '<div class="compact-event">';
      html += '<div class="compact-dot ' + ev.type + '"></div>';
      html += '<div class="compact-time">' + ev.time + '</div>';
      html += '<div class="compact-title">' + ev.title + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('upcoming-days').innerHTML = html || '<p style="color:rgba(251,248,243,0.3);font-size:13px;">No upcoming events loaded</p>';
}

function showTip(e, idx) {
  var ev = window._todayEvents[idx];
  if (!ev) return;
  var tip = document.getElementById('tooltip');
  document.getElementById('tooltip-title').textContent = ev.title + ' · ' + ev.time;
  document.getElementById('tooltip-notes').textContent = ev.notes || (ev.type === 'free' ? 'Free block — protect this time.' : 'No notes.');
  tip.style.display = 'block';
  tip.style.left = Math.min(e.clientX + 12, window.innerWidth - 280) + 'px';
  tip.style.top = (e.clientY - 20) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none'; }

loadCalendar();
</script>
</body>
</html>
