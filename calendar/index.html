<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
a{color:inherit;text-decoration:none;}
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(10,14,20,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,169,81,0.25);}
.hdr-logo{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--navy);}
.hdr-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.back{color:rgba(251,248,243,0.45);font-size:13px;}
.back:hover{color:var(--gold);}
.wrap{max-width:960px;margin:0 auto;padding:16px;}
.live-badge{font-size:10px;color:rgba(251,248,243,0.4);text-align:right;margin-bottom:12px;}
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.qcard{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;text-align:center;}
.qcard.gold{border-top:3px solid var(--gold);}
.qcard.green{border-top:3px solid #4CAF50;}
.qcard.navy{border-top:3px solid var(--navy);}
.qval{font-family:'Archivo Black',sans-serif;font-size:28px;margin:4px 0 2px;}
.qval.gold{color:var(--gold);}
.qval.green{color:#4CAF50;}
.qval.navy{color:var(--navy);}
.qlbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(251,248,243,0.4);}
.grid2{display:grid;grid-template-columns:3fr 2fr;gap:16px;}
@media(max-width:768px){.grid2{grid-template-columns:1fr;}}
.section{background:rgba(16,21,32,0.7);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px;margin-bottom:16px;}
.section-title{font-family:'Archivo Black',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
/* Timeline */
.timeline{position:relative;padding-left:8px;}
.timeline-event{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);position:relative;}
.timeline-event:last-child{border-bottom:none;}
.ev-time{min-width:50px;font-size:11px;color:rgba(251,248,243,0.4);font-weight:500;text-align:right;padding-top:2px;}
.ev-dot-wrap{display:flex;flex-direction:column;align-items:center;min-width:16px;}
.ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ev-line{flex:1;width:2px;background:rgba(255,255,255,0.06);margin-top:4px;}
.ev-content{flex:1;}
.ev-title{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.3;}
.ev-dur{font-size:10px;color:rgba(251,248,243,0.35);}
.ev-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:4px;}
/* Event types */
.type-dc{background:rgba(200,169,81,0.15);color:var(--gold);}
.type-deep{background:rgba(56,98,23,0.2);color:#6db33f;}
.type-personal{background:rgba(16,71,145,0.2);color:#5b9bd5;}
.type-admin{background:rgba(251,248,243,0.08);color:rgba(251,248,243,0.5);}
.type-mentor{background:rgba(139,92,246,0.15);color:#a78bfa;}
.dot-dc{background:var(--gold);}
.dot-deep{background:#4CAF50;}
.dot-personal{background:var(--navy);}
.dot-admin{background:rgba(251,248,243,0.2);}
.dot-mentor{background:#8B5CF6;}
/* Week ahead */
.day-group{margin-bottom:16px;}
.day-label{font-family:'Archivo Black',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(200,169,81,0.1);}
.week-event{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.week-event:last-child{border-bottom:none;}
.we-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.we-time{font-size:11px;color:rgba(251,248,243,0.35);min-width:50px;}
.we-title{font-size:12px;flex:1;}
.loading{text-align:center;padding:40px;color:rgba(251,248,243,0.4);}
.no-events{font-size:12px;color:rgba(251,248,243,0.3);text-align:center;padding:16px;}
</style>
</head>
<body>
<div class="hdr">
  <a class="hdr-logo" href="../index.html">B&G</a>
  <span class="hdr-title">Calendar</span>
  <a class="back" href="../index.html">← MC</a>
</div>
<div class="wrap">
  <div class="live-badge" id="live-badge">📡 Live · loading...</div>

  <div class="quick-stats">
    <div class="qcard gold"><div class="qval gold" id="q-dcs">—</div><div class="qlbl">DCs Today</div></div>
    <div class="qcard green"><div class="qval green" id="q-deep">—</div><div class="qlbl">Deep Work Blocks</div></div>
    <div class="qcard navy"><div class="qval navy" id="q-today">—</div><div class="qlbl">Events Today</div></div>
  </div>

  <div class="grid2">
    <div>
      <div class="section">
        <div class="section-title">Today's Schedule</div>
        <div class="timeline" id="today-timeline"><div class="loading">Loading…</div></div>
      </div>
    </div>
    <div>
      <div class="section">
        <div class="section-title">Week Ahead</div>
        <div id="week-ahead"><div class="loading">Loading…</div></div>
      </div>
    </div>
  </div>
</div>
<script>
function getEventType(summary) {
  const s = (summary||'').toLowerCase();
  if (s.includes('discovery call') || s.includes('dc available')) return 'dc';
  if (s.includes('🔨') || s.includes('\ud83d\udd28')) return 'deep';
  if (s.includes('boxing') || s.includes('journal') || s.includes('gym')) return 'personal';
  if (s.includes('mentor call') || s.includes('mentor')) return 'mentor';
  return 'admin';
}

function eventEmoji(type) {
  const map = { dc: '📞', deep: '🔨', personal: '🏋️', admin: '📝', mentor: '🎓' };
  return map[type] || '📅';
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit', hour12:true}).toLowerCase().replace(' am','am').replace(' pm','pm');
}

function eventDuration(start, end) {
  const mins = Math.round((new Date(end) - new Date(start)) / 60000);
  if (mins < 60) return `${mins}min`;
  const hrs = mins / 60;
  return Number.isInteger(hrs) ? `${hrs}hr` : `${(hrs).toFixed(1)}hr`;
}

function cleanTitle(summary) {
  return (summary||'').replace('Updated - ', '').replace('\ud83d\udd28 ', '🔨 ');
}

const dotColors = {
  dc: 'dot-dc', deep: 'dot-deep', personal: 'dot-personal',
  admin: 'dot-admin', mentor: 'dot-mentor'
};
const badgeClasses = {
  dc: 'type-dc', deep: 'type-deep', personal: 'type-personal',
  admin: 'type-admin', mentor: 'type-mentor'
};
const typeLabels = {
  dc: '📞 Discovery Call', deep: '🔨 Deep Work', personal: '🏋️ Personal',
  admin: '📝 Admin', mentor: '🎓 Mentor'
};

async function init() {
  try {
    const r = await fetch('../data/calendar.json');
    const data = await r.json();

    const gen = new Date(data.generated);
    document.getElementById('live-badge').textContent = `📡 Live · ${gen.toLocaleString('en-AU',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'})}`;

    const events = data.events || [];
    const byDay = data.by_day || {};

    // Quick stats
    const today = '2026-03-21';
    const todayEvents = byDay[today] || [];
    const dcCount = todayEvents.filter(e => getEventType(e.summary) === 'dc' && !e.summary.toLowerCase().includes('available')).length;
    const deepCount = todayEvents.filter(e => getEventType(e.summary) === 'deep').length;

    document.getElementById('q-dcs').textContent = dcCount;
    document.getElementById('q-deep').textContent = deepCount;
    document.getElementById('q-today').textContent = todayEvents.length;

    // Today timeline
    if (!todayEvents.length) {
      document.getElementById('today-timeline').innerHTML = '<div class="no-events">No events today</div>';
    } else {
      document.getElementById('today-timeline').innerHTML = todayEvents.map((ev, i) => {
        const type = getEventType(ev.summary);
        const dotCls = dotColors[type];
        const badgeCls = badgeClasses[type];
        const label = typeLabels[type];
        const dur = eventDuration(ev.start, ev.end);
        const isLast = i === todayEvents.length - 1;
        return `<div class="timeline-event">
          <div class="ev-time">${fmtTime(ev.start)}</div>
          <div class="ev-dot-wrap">
            <div class="ev-dot ${dotCls}"></div>
            ${!isLast ? '<div class="ev-line"></div>' : ''}
          </div>
          <div class="ev-content">
            <div class="ev-title">${cleanTitle(ev.summary)}</div>
            <div class="ev-dur">${fmtTime(ev.start)} – ${fmtTime(ev.end)} · ${dur}</div>
            <span class="ev-badge ${badgeCls}">${label}</span>
          </div>
        </div>`;
      }).join('');
    }

    // Week ahead (excluding today)
    const futureDays = Object.entries(byDay)
      .filter(([day]) => day !== today)
      .sort(([a],[b]) => a.localeCompare(b));

    if (!futureDays.length) {
      document.getElementById('week-ahead').innerHTML = '<div class="no-events">No upcoming events</div>';
    } else {
      document.getElementById('week-ahead').innerHTML = futureDays.map(([day, dayEvents]) => {
        const dt = new Date(day + 'T00:00:00');
        const dayName = dt.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'short' });
        const evHtml = dayEvents.map(ev => {
          const type = getEventType(ev.summary);
          const dotCls = dotColors[type];
          return `<div class="week-event">
            <div class="we-dot ${dotCls}"></div>
            <div class="we-time">${fmtTime(ev.start)}</div>
            <div class="we-title">${cleanTitle(ev.summary)}</div>
          </div>`;
        }).join('');
        return `<div class="day-group">
          <div class="day-label">${dayName}</div>
          ${evHtml}
        </div>`;
      }).join('');
    }

  } catch(e) {
    document.getElementById('today-timeline').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
