<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(10,14,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold);}
.header-logo{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--navy);}
.header-title{font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);}
.back-link{color:rgba(251,248,243,0.5);font-size:13px;text-decoration:none;}
.back-link:hover{color:var(--gold);}
.container{max-width:1000px;margin:0 auto;padding:24px 20px;}

/* TEAM PILLS */
.team-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.team-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(16,21,32,0.8);color:rgba(251,248,243,0.5);transition:all 0.15s;}
.team-pill:hover{border-color:rgba(200,169,81,0.3);color:var(--cream);}
.team-pill.active{background:var(--gold);color:var(--dark);border-color:var(--gold);}

/* STATS */
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.hero-card{background:rgba(16,21,32,0.8);border:1px solid rgba(200,169,81,0.15);border-radius:16px;padding:20px;border-top:3px solid var(--gold);}
.hero-val{font-family:'Archivo Black',sans-serif;font-size:28px;margin:8px 0 4px;}
.hero-lbl{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.hero-sub{font-size:11px;color:rgba(251,248,243,0.4);}

/* SECTIONS */
.section{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px;margin-bottom:24px;}
.section-title{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* TIMELINE */
.timeline-wrap{position:relative;padding-left:60px;}
.time-axis{position:absolute;left:0;top:0;bottom:0;width:48px;}
.time-label{position:absolute;font-size:10px;color:rgba(251,248,243,0.35);font-weight:600;transform:translateY(-50%);}
.event-block{position:absolute;left:4px;right:4px;border-radius:8px;padding:8px 10px;cursor:pointer;transition:all 0.2s;overflow:hidden;}
.event-block:hover{filter:brightness(1.15);transform:translateX(2px);}
.event-block.deep_work{background:rgba(16,71,145,0.7);border-left:3px solid var(--navy);}
.event-block.dc_call{background:rgba(200,169,81,0.2);border-left:3px solid var(--gold);}
.event-block.meeting{background:rgba(56,98,23,0.5);border-left:3px solid var(--green);}
.event-block.personal{background:rgba(232,239,226,0.1);border-left:3px solid var(--sage);}
.event-block.free{background:transparent;border:1px dashed rgba(255,255,255,0.2);border-left:3px dashed rgba(255,255,255,0.3);}
.event-block.done{opacity:0.5;}
.event-title{font-size:12px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-time-label{font-size:10px;color:rgba(251,248,243,0.5);margin-top:2px;}
.now-line{position:absolute;left:-8px;right:0;height:2px;background:var(--red);z-index:10;}
.now-dot{position:absolute;left:-12px;width:8px;height:8px;border-radius:50%;background:var(--red);top:50%;transform:translateY(-50%);}
.now-label{position:absolute;right:4px;top:-10px;font-size:9px;color:var(--red);font-weight:700;}
.timeline-grid{position:absolute;left:60px;right:0;top:0;bottom:0;pointer-events:none;}
.grid-line{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,0.04);}

/* COMPACT */
.compact-day{margin-bottom:20px;}
.compact-day-label{font-family:'Archivo Black',sans-serif;font-size:12px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.compact-event{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,0.03);}
.compact-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.compact-dot.deep_work{background:var(--navy);}
.compact-dot.dc_call{background:var(--gold);}
.compact-dot.meeting{background:var(--green);}
.compact-dot.personal{background:var(--sage);}
.compact-dot.free{background:rgba(255,255,255,0.2);}
.compact-time{font-size:11px;color:rgba(251,248,243,0.4);min-width:80px;font-variant-numeric:tabular-nums;}
.compact-title{font-size:13px;flex:1;}

/* SESSION CARDS */
.session-card{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.03);margin-bottom:6px;}
.session-time{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--gold);min-width:50px;}
.session-mentor{font-size:13px;font-weight:600;min-width:80px;}
.session-member{font-size:13px;flex:1;}
.session-member a{color:var(--cream);text-decoration:none;}
.session-member a:hover{color:var(--gold);text-decoration:underline;}
.session-week{font-size:11px;color:rgba(251,248,243,0.4);min-width:50px;}
.session-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(76,175,80,0.15);color:#4CAF50;}

/* DC CARDS */
.dc-card{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(200,169,81,0.05);border:1px solid rgba(200,169,81,0.1);margin-bottom:6px;}
.dc-time{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--gold);min-width:50px;}
.dc-name{font-size:13px;font-weight:600;flex:1;}
.dc-name a{color:var(--cream);text-decoration:none;}
.dc-name a:hover{color:var(--gold);}
.dc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;}
.dc-status.scheduled{background:rgba(200,169,81,0.15);color:var(--gold);}
.dc-status.closed{background:rgba(76,175,80,0.15);color:#4CAF50;}
.dc-status.not-closed{background:rgba(224,82,82,0.15);color:var(--red);}
.dc-status.rescheduled{background:rgba(232,160,48,0.15);color:var(--amber);}
.dc-status.no-show{background:rgba(255,255,255,0.06);color:rgba(251,248,243,0.4);}
.btn{border:none;border-radius:8px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-gold{background:var(--gold);color:var(--dark);}
.btn-ghost{background:rgba(255,255,255,0.06);color:rgba(251,248,243,0.6);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.empty-state{font-size:12px;color:rgba(251,248,243,0.3);padding:20px;text-align:center;}

/* MODAL */
.mc-modal-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.mc-modal{background:#141924;border:1px solid rgba(200,169,81,0.25);border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.mc-modal h3{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--gold);margin-bottom:12px;}
.mc-modal p{font-size:13px;color:rgba(251,248,243,0.6);margin-bottom:12px;}
.mc-modal textarea{width:100%;min-height:80px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;outline:none;}
.mc-modal textarea:focus{border-color:var(--gold);}
.mc-modal select{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:8px;}
.mc-modal select option{background:#141924;}
.mc-modal label{font-size:11px;font-weight:600;color:rgba(251,248,243,0.5);display:block;margin-bottom:4px;}
.mc-modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gold);color:var(--dark);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:600;transition:transform 0.3s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:768px){.hero-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="header-logo">B&G</div>
    <div class="header-title">Calendar</div>
  </div>
  <a class="back-link" href="../">← Mission Control</a>
</div>

<div class="container">
  <!-- TEAM SWITCHER -->
  <div class="team-pills" id="team-pills"></div>
  
  <!-- STATS -->
  <div class="hero-grid" id="hero-stats"></div>
  
  <!-- MENTOR SESSIONS -->
  <div class="section" id="mentor-sessions-section">
    <div class="section-title">👥 Mentor Sessions Today</div>
    <div id="mentor-sessions"></div>
  </div>
  
  <!-- DC CALLS -->
  <div class="section" id="dc-calls-section">
    <div class="section-title">📞 Discovery Calls Today</div>
    <div id="dc-calls"></div>
  </div>
  
  <!-- CALENDAR -->
  <div class="section">
    <div class="section-title" id="cal-section-title">📅 Today's Schedule</div>
    <div id="calendar-timeline"></div>
  </div>
  
  <!-- TOMORROW -->
  <div class="section" id="tomorrow-section">
    <div class="section-title">📅 Tomorrow</div>
    <div id="tomorrow-events"></div>
  </div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script>
const TEAM = ['Harry','Norri','Rye','Brodie','Elliot','Anthony','Tom','Jack','Harper','Bailey','Cristian'];
let activePerson = 'Harry';
let calData = null;
let mentorData = null;
let dashData = null;
const dcOutcomes = JSON.parse(localStorage.getItem('mc_dc_outcomes') || '{}');

async function init() {
  try {
    // Try new path first, fallback to old
    let r;
    try { r = await fetch('../data/calendars/harry.json'); if(!r.ok) throw 0; }
    catch(e) { r = await fetch('../data/calendar.json'); }
    calData = await r.json();
  } catch(e) { console.warn('No calendar data'); }
  
  try {
    const r = await fetch('../data/mentor-sessions.json');
    mentorData = await r.json();
  } catch(e) { console.warn('No mentor session data'); }
  
  try {
    const r = await fetch('../data/dashboard-data.json');
    dashData = await r.json();
  } catch(e) {}
  
  renderTeamPills();
  renderAll();
}

function renderTeamPills() {
  document.getElementById('team-pills').innerHTML = TEAM.map(name => 
    `<div class="team-pill${name===activePerson?' active':''}" onclick="switchPerson('${name}')">${name}</div>`
  ).join('');
}

function switchPerson(name) {
  activePerson = name;
  renderTeamPills();
  renderAll();
}

function renderAll() {
  if(activePerson !== 'Harry') {
    // No data for others yet
    document.getElementById('hero-stats').innerHTML = '';
    document.getElementById('mentor-sessions').innerHTML = `<div class="empty-state">${activePerson}'s calendar data syncs at next refresh</div>`;
    document.getElementById('dc-calls').innerHTML = '';
    document.getElementById('calendar-timeline').innerHTML = `<div class="empty-state">${activePerson}'s calendar data syncs at next refresh</div>`;
    document.getElementById('tomorrow-events').innerHTML = '';
    return;
  }
  renderStats();
  renderMentorSessions();
  renderDCCalls();
  renderTimeline();
  renderTomorrow();
}

function renderStats() {
  if(!calData || !calData.days || !calData.days[0]) return;
  const today = calData.days[0];
  const dcCalls = today.events.filter(e => e.type === 'dc_call');
  const deepWork = today.events.filter(e => e.type === 'deep_work');
  const totalEvents = today.events.length;
  
  document.getElementById('hero-stats').innerHTML = `
    <div class="hero-card"><div class="hero-lbl">Events Today</div><div class="hero-val">${totalEvents}</div><div class="hero-sub">${today.label}</div></div>
    <div class="hero-card"><div class="hero-lbl">DC Calls</div><div class="hero-val" style="color:var(--gold);">${dcCalls.length}</div><div class="hero-sub">Discovery calls scheduled</div></div>
    <div class="hero-card"><div class="hero-lbl">Deep Work</div><div class="hero-val" style="color:var(--navy);">${deepWork.length}</div><div class="hero-sub">${deepWork.map(d=>d.title.replace('🔨 ','')).join(', ')||'None'}</div></div>
  `;
}

function renderMentorSessions() {
  const sessions = mentorData?.sessions || [];
  if(!sessions.length) {
    document.getElementById('mentor-sessions').innerHTML = '<div class="empty-state">No mentor sessions data</div>';
    return;
  }
  document.getElementById('mentor-sessions').innerHTML = sessions.map(s => `
    <div class="session-card">
      <div class="session-time">${s.time}</div>
      <div class="session-mentor">${s.mentor}</div>
      <div class="session-member"><a href="https://app.hubspot.com/contacts/48782903" target="_blank">${s.member}</a></div>
      <div class="session-week">W${s.week}</div>
      <div class="session-status">${s.status}</div>
    </div>
  `).join('');
}

function renderDCCalls() {
  if(!calData || !calData.days || !calData.days[0]) {
    document.getElementById('dc-calls').innerHTML = '<div class="empty-state">No DC data</div>';
    return;
  }
  const dcCalls = calData.days[0].events.filter(e => e.type === 'dc_call');
  if(!dcCalls.length) {
    document.getElementById('dc-calls').innerHTML = '<div class="empty-state">No discovery calls today</div>';
    return;
  }
  
  document.getElementById('dc-calls').innerHTML = dcCalls.map((dc, i) => {
    const name = dc.title.replace('📞 DC — ','').replace('📞 ','');
    const time = dc.time.split('-')[0];
    const outcome = dcOutcomes['dc-'+i];
    let statusHtml = '<span class="dc-status scheduled">Scheduled</span>';
    if(outcome) {
      const cls = outcome.result==='closed'?'closed':outcome.result==='not_closed'?'not-closed':outcome.result==='rescheduled'?'rescheduled':'no-show';
      const label = outcome.result==='closed'?'Closed ✅':outcome.result==='not_closed'?'Not Closed ❌':outcome.result==='rescheduled'?'Rescheduled 🔄':'No Show';
      statusHtml = `<span class="dc-status ${cls}">${label}</span>`;
    }
    
    return `<div class="dc-card">
      <div class="dc-time">${time}</div>
      <div class="dc-name"><a href="https://app.hubspot.com/contacts/48782903" target="_blank">${name}</a></div>
      ${statusHtml}
      ${!outcome?`<button class="btn btn-ghost" onclick="openDCOutcomeModal(${i},'${name.replace(/'/g,"\\'")}')">Log Outcome</button>`:''}
    </div>`;
  }).join('');
}

function renderTimeline() {
  if(!calData || !calData.days || !calData.days[0]) return;
  const today = calData.days[0];
  const events = today.events;
  
  // Calculate timeline bounds
  let minH = 24, maxH = 0;
  events.forEach(ev => {
    const parts = ev.time.split('-');
    const startH = parseInt(parts[0].split(':')[0]);
    const endParts = parts[1] ? parts[1].split(':') : [startH+1, '00'];
    const endH = parseInt(endParts[0]);
    minH = Math.min(minH, startH);
    maxH = Math.max(maxH, endH + 1);
  });
  minH = Math.max(0, minH - 1);
  maxH = Math.min(24, maxH + 1);
  
  const hourHeight = 60;
  const totalHeight = (maxH - minH) * hourHeight;
  
  let timeLabels = '';
  let gridLines = '';
  for(let h = minH; h <= maxH; h++) {
    const top = (h - minH) * hourHeight;
    timeLabels += `<div class="time-label" style="top:${top}px;">${String(h).padStart(2,'0')}:00</div>`;
    gridLines += `<div class="grid-line" style="top:${top}px;"></div>`;
  }
  
  // Now line
  const now = new Date();
  const melbNow = new Date(now.toLocaleString('en-US', {timeZone:'Australia/Melbourne'}));
  const nowH = melbNow.getHours() + melbNow.getMinutes()/60;
  let nowLine = '';
  if(nowH >= minH && nowH <= maxH) {
    const nowTop = (nowH - minH) * hourHeight;
    nowLine = `<div class="now-line" style="top:${nowTop}px;"><div class="now-dot"></div><div class="now-label">NOW</div></div>`;
  }
  
  const eventBlocks = events.map(ev => {
    const parts = ev.time.split('-');
    const [sh, sm] = parts[0].split(':').map(Number);
    const endParts = parts[1] ? parts[1].split(':').map(Number) : [sh+1, 0];
    const startDecimal = sh + sm/60;
    const endDecimal = endParts[0] + endParts[1]/60;
    const top = (startDecimal - minH) * hourHeight;
    const height = Math.max(24, (endDecimal - startDecimal) * hourHeight - 2);
    const isDone = ev.status === 'done';
    
    return `<div class="event-block ${ev.type}${isDone?' done':''}" style="top:${top}px;height:${height}px;">
      <div class="event-title">${ev.title}</div>
      ${height > 30 ? `<div class="event-time-label">${ev.time}</div>` : ''}
      ${ev.notes && height > 50 ? `<div style="font-size:10px;color:rgba(251,248,243,0.4);margin-top:2px;">${ev.notes}</div>` : ''}
    </div>`;
  }).join('');
  
  document.getElementById('calendar-timeline').innerHTML = `
    <div class="timeline-wrap" style="height:${totalHeight}px;">
      <div class="time-axis">${timeLabels}</div>
      <div class="timeline-grid">${gridLines}${nowLine}</div>
      <div style="position:relative;margin-left:0;">${eventBlocks}</div>
    </div>`;
}

function renderTomorrow() {
  if(!calData || !calData.days || !calData.days[1]) {
    document.getElementById('tomorrow-section').style.display = 'none';
    return;
  }
  const tmr = calData.days[1];
  document.getElementById('tomorrow-events').innerHTML = `
    <div class="compact-day">
      <div class="compact-day-label">${tmr.label}</div>
      ${tmr.events.map(ev => `
        <div class="compact-event">
          <div class="compact-dot ${ev.type}"></div>
          <div class="compact-time">${ev.time}</div>
          <div class="compact-title">${ev.title}</div>
        </div>
      `).join('')}
    </div>`;
}

/* ═══ DC OUTCOME MODAL ═══ */
function openDCOutcomeModal(idx, name) {
  openModal(`<h3>📞 Log Outcome — ${name}</h3>
    <label>Result</label>
    <select id="modal-dc-result">
      <option value="closed">Closed ✅</option>
      <option value="not_closed">Not Closed ❌</option>
      <option value="rescheduled">Rescheduled 🔄</option>
      <option value="no_show">No Show</option>
    </select>
    <label>Notes</label>
    <textarea id="modal-dc-notes" placeholder="Any notes about the call..."></textarea>`,
    [{label:'Save',gold:true,action:()=>{
      const result = document.getElementById('modal-dc-result').value;
      const notes = document.getElementById('modal-dc-notes').value;
      dcOutcomes['dc-'+idx] = {result, notes, time: new Date().toISOString()};
      localStorage.setItem('mc_dc_outcomes', JSON.stringify(dcOutcomes));
      closeModal(); renderDCCalls(); showToast('Outcome logged');
    }},{label:'Cancel',action:closeModal}]);
}

function openModal(html, buttons) {
  const c = document.getElementById('modal-container');
  const btns = (buttons||[]).map(b => 
    `<button class="btn ${b.gold?'btn-gold':'btn-ghost'}" onclick="(${b.action.toString()})()">${b.label}</button>`
  ).join('');
  c.innerHTML = `<div class="mc-modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="mc-modal">${html}<div class="mc-modal-actions">${btns}</div></div></div>`;
  document.addEventListener('keydown', escHandler);
}
function closeModal() {
  document.getElementById('modal-container').innerHTML='';
  document.removeEventListener('keydown', escHandler);
}
function escHandler(e) { if(e.key==='Escape') closeModal(); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
