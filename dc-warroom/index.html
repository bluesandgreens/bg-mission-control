<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC War Room — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
a{color:inherit;text-decoration:none;}
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(10,14,20,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,169,81,0.25);}
.hdr-logo{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--navy);}
.hdr-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.back{color:rgba(251,248,243,0.45);font-size:13px;}
.back:hover{color:var(--gold);}
.wrap{max-width:1200px;margin:0 auto;padding:16px;}
.live-badge{font-size:10px;color:rgba(251,248,243,0.4);text-align:right;margin-bottom:12px;}
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
@media(max-width:640px){.hero{grid-template-columns:repeat(2,1fr);}}
.hcard{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;text-align:center;border-top:3px solid var(--gold);}
.hcard.green{border-top-color:#4CAF50;}
.hcard.red{border-top-color:var(--red);}
.hcard.blue{border-top-color:#3B82F6;}
.hval{font-family:'Archivo Black',sans-serif;font-size:28px;margin:4px 0 2px;color:var(--gold);}
.hval.green{color:#4CAF50;}
.hval.red{color:var(--red);}
.hval.blue{color:#3B82F6;}
.hlbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.hsub{font-size:10px;color:rgba(251,248,243,0.35);margin-top:2px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:768px){.grid2{grid-template-columns:1fr;}}
.grid3{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:20px;}
@media(max-width:768px){.grid3{grid-template-columns:1fr;}}
.section{background:rgba(16,21,32,0.7);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px;}
.section-title{font-family:'Archivo Black',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
/* Leaderboard */
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(251,248,243,0.35);padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.06);}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);}
tbody tr:last-child{border-bottom:none;}
td{padding:9px 8px;vertical-align:middle;}
.rep-name{font-weight:600;font-size:13px;}
.rate-bar-wrap{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;min-width:60px;}
.rate-bar{height:100%;border-radius:3px;transition:width 0.4s;}
.rate-lbl{font-size:11px;font-weight:700;}
.rate-green{color:#4CAF50;}
.rate-amber{color:var(--amber);}
.rate-red{color:var(--red);}
/* Outcome bars */
.outcome-row{margin-bottom:10px;}
.outcome-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.outcome-name{font-size:12px;}
.outcome-count{font-size:11px;color:rgba(251,248,243,0.5);}
.outcome-bar-wrap{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.outcome-bar{height:100%;border-radius:4px;}
.ob-green{background:#4CAF50;}
.ob-amber{background:var(--amber);}
.ob-red{background:var(--red);}
.ob-blue{background:#3B82F6;}
.ob-purple{background:#8B5CF6;}
/* Call feed */
.call-feed{max-height:380px;overflow-y:auto;}
.call-feed::-webkit-scrollbar{width:4px;}
.call-feed::-webkit-scrollbar-track{background:transparent;}
.call-feed::-webkit-scrollbar-thumb{background:rgba(200,169,81,0.2);border-radius:2px;}
.call-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.call-item:last-child{border-bottom:none;}
.call-date{font-size:10px;color:rgba(251,248,243,0.35);min-width:52px;}
.call-name{font-size:12px;font-weight:600;flex:1;}
.call-rep{font-size:10px;color:rgba(251,248,243,0.5);}
.call-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.cb-booked{background:rgba(76,175,80,0.15);color:#4CAF50;}
.cb-followup{background:rgba(59,130,246,0.15);color:#3B82F6;}
.cb-objection{background:rgba(224,82,82,0.15);color:var(--red);}
.cb-noshow{background:rgba(255,255,255,0.08);color:rgba(251,248,243,0.4);}
.call-hs{font-size:10px;color:rgba(200,169,81,0.5);padding:2px 6px;border:1px solid rgba(200,169,81,0.15);border-radius:5px;}
.call-hs:hover{color:var(--gold);border-color:var(--gold);}
/* Objections */
.obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:480px){.obj-grid{grid-template-columns:1fr;}}
.obj-card{background:rgba(224,82,82,0.06);border:1px solid rgba(224,82,82,0.15);border-radius:10px;padding:12px;}
.obj-type{font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px;}
.obj-count{font-family:'Archivo Black',sans-serif;font-size:22px;color:var(--cream);}
.obj-reps{font-size:10px;color:rgba(251,248,243,0.4);margin-top:4px;}
.loading{text-align:center;padding:40px;color:rgba(251,248,243,0.4);}
</style>
</head>
<body>
<div class="hdr">
  <a class="hdr-logo" href="../index.html">B&G</a>
  <span class="hdr-title">DC War Room</span>
  <a class="back" href="../index.html">← MC</a>
</div>
<div class="wrap">
  <div class="live-badge" id="live-badge">📡 Live · loading...</div>

  <div class="hero">
    <div class="hcard"><div class="hval" id="h-total">—</div><div class="hlbl">Total DCs (30d)</div><div class="hsub">Discovery calls taken</div></div>
    <div class="hcard green"><div class="hval green" id="h-rate">—</div><div class="hlbl">Close Rate</div><div class="hsub">Onboarding booked</div></div>
    <div class="hcard blue"><div class="hval blue" id="h-best">—</div><div class="hlbl">Best Closer</div><div class="hsub" id="h-best-rate">—</div></div>
    <div class="hcard red"><div class="hval red" id="h-volume">—</div><div class="hlbl">Top Volume</div><div class="hsub" id="h-volume-name">—</div></div>
  </div>

  <div class="grid3">
    <div class="section">
      <div class="section-title">Rep Leaderboard</div>
      <table id="rep-table">
        <thead><tr>
          <th>Rep</th><th>DCs</th><th>Closed</th><th>Close Rate</th><th>Rate Bar</th>
        </tr></thead>
        <tbody id="rep-tbody"><tr><td colspan="5" class="loading">Loading…</td></tr></tbody>
      </table>
    </div>
    <div class="section">
      <div class="section-title">Outcome Breakdown</div>
      <div id="outcome-bars"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <div class="grid2">
    <div class="section">
      <div class="section-title">Recent Calls</div>
      <div class="call-feed" id="call-feed"><div class="loading">Loading…</div></div>
    </div>
    <div class="section">
      <div class="section-title">Objection Tracker</div>
      <div class="obj-grid" id="obj-grid"><div class="loading">Loading…</div></div>
    </div>
  </div>
</div>
<script>
function rateColor(r) {
  if (r >= 0.5) return '#4CAF50';
  if (r >= 0.3) return '#E8A030';
  return '#E05252';
}
function rateClass(r) {
  if (r >= 0.5) return 'rate-green';
  if (r >= 0.3) return 'rate-amber';
  return 'rate-red';
}
function callBadge(outcome) {
  if (!outcome) return '<span class="call-badge cb-noshow">—</span>';
  const o = outcome.toLowerCase();
  if (o.includes('onboarding') || o.includes('booked')) return `<span class="call-badge cb-booked">✅ Booked</span>`;
  if (o.includes('follow')) return `<span class="call-badge cb-followup">📅 Follow Up</span>`;
  if (o.includes('no show')) return `<span class="call-badge cb-noshow">👻 No Show</span>`;
  return `<span class="call-badge cb-objection">⚠️ ${outcome.replace(' Objection','')}</span>`;
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function outcomeColor(outcome) {
  const o = (outcome||'').toLowerCase();
  if (o.includes('onboarding')) return 'ob-green';
  if (o.includes('follow')) return 'ob-blue';
  if (o.includes('no show')) return 'ob-amber';
  return 'ob-red';
}

async function init() {
  try {
    const r = await fetch('../data/dc-warroom.json');
    const data = await r.json();
    const gen = new Date(data.generated);
    document.getElementById('live-badge').textContent = `📡 Live · ${gen.toLocaleString('en-AU',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'})}`;

    const total = data.total_dcs_30d;
    const outcomes = data.outcomes || {};
    const repStats = data.rep_stats || {};
    const calls = data.calls || [];

    // Hero
    const booked = outcomes['Onboarding Booked'] || 0;
    const closeRate = total > 0 ? Math.round(booked/total*100) : 0;
    document.getElementById('h-total').textContent = total;
    document.getElementById('h-rate').textContent = closeRate + '%';

    // Best closer & top volume
    let bestCloser = '', bestRate = 0, topVolume = '', topVol = 0;
    Object.entries(repStats).forEach(([rep, s]) => {
      const rate = s.total > 0 ? s.closed / s.total : 0;
      if (s.total >= 5 && rate > bestRate) { bestRate = rate; bestCloser = rep; }
      if (s.total > topVol) { topVol = s.total; topVolume = rep; }
    });
    document.getElementById('h-best').textContent = bestCloser || '—';
    document.getElementById('h-best-rate').textContent = bestRate > 0 ? Math.round(bestRate*100)+'% close rate' : '';
    document.getElementById('h-volume').textContent = topVol;
    document.getElementById('h-volume-name').textContent = topVolume ? topVolume + ' DCs' : '';

    // Rep leaderboard - sort by close rate
    const reps = Object.entries(repStats).map(([name, s]) => ({
      name, total: s.total, closed: s.closed,
      rate: s.total > 0 ? s.closed / s.total : 0
    })).sort((a, b) => b.rate - a.rate);

    document.getElementById('rep-tbody').innerHTML = reps.map(rep => {
      const pct = Math.round(rep.rate * 100);
      const color = rateColor(rep.rate);
      const cls = rateClass(rep.rate);
      return `<tr>
        <td><span class="rep-name">${escHtml(rep.name)}</span></td>
        <td>${rep.total}</td>
        <td>${rep.closed}</td>
        <td><span class="rate-lbl ${cls}">${pct}%</span></td>
        <td><div class="rate-bar-wrap"><div class="rate-bar" style="width:${pct}%;background:${color};"></div></div></td>
      </tr>`;
    }).join('');

    // Outcome bars
    const totalOutcomes = Object.values(outcomes).reduce((a,b) => a+b, 0);
    const outcomeOrder = ['Onboarding Booked','Follow Up Scheduled','Price Objection','Time Objection','Partner Objection','No Show','Son Objection'];
    document.getElementById('outcome-bars').innerHTML = outcomeOrder
      .filter(k => outcomes[k])
      .map(k => {
        const count = outcomes[k];
        const pct = Math.round(count / totalOutcomes * 100);
        const cls = outcomeColor(k);
        return `<div class="outcome-row">
          <div class="outcome-label">
            <span class="outcome-name">${k}</span>
            <span class="outcome-count">${count} (${pct}%)</span>
          </div>
          <div class="outcome-bar-wrap"><div class="outcome-bar ${cls}" style="width:${pct}%;"></div></div>
        </div>`;
      }).join('');

    // Call feed - most recent 40
    const recentCalls = calls.slice(0, 40);
    document.getElementById('call-feed').innerHTML = recentCalls.map(c => `
      <div class="call-item">
        <span class="call-date">${fmtDate(c.date)}</span>
        <span class="call-name">${escHtml(c.name)}</span>
        <span class="call-rep">${escHtml(c.rep||'')}</span>
        ${callBadge(c.outcome)}
        ${c.hs_url ? `<a class="call-hs" href="${c.hs_url}" target="_blank" rel="noopener">↗</a>` : ''}
      </div>`).join('');

    // Objection tracker
    const objections = {
      'Price Objection': outcomes['Price Objection'] || 0,
      'Time Objection': outcomes['Time Objection'] || 0,
      'Partner Objection': outcomes['Partner Objection'] || 0,
      'Son Objection': outcomes['Son Objection'] || 0,
    };
    // Count reps who faced each objection
    const repObjMap = {};
    calls.forEach(c => {
      if (c.outcome && c.outcome.includes('Objection')) {
        if (!repObjMap[c.outcome]) repObjMap[c.outcome] = {};
        repObjMap[c.outcome][c.rep] = (repObjMap[c.outcome][c.rep]||0) + 1;
      }
    });

    document.getElementById('obj-grid').innerHTML = Object.entries(objections)
      .filter(([k,v]) => v > 0)
      .map(([k, count]) => {
        const reps = repObjMap[k] ? Object.entries(repObjMap[k]).map(([r,n]) => `${r}(${n})`).join(', ') : '';
        return `<div class="obj-card">
          <div class="obj-type">${k}</div>
          <div class="obj-count">${count}x</div>
          ${reps ? `<div class="obj-reps">Reps: ${escHtml(reps)}</div>` : ''}
        </div>`;
      }).join('') || '<div class="loading">No objections recorded</div>';

  } catch(e) {
    document.getElementById('rep-tbody').innerHTML = `<tr><td colspan="5" class="loading">Error: ${e.message}</td></tr>`;
  }
}

init();
</script>
</body>
</html>
