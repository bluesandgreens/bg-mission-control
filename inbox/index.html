<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(10,14,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold);}
.header-logo{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--navy);letter-spacing:1px;}
.header-title{font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);}
.back-link{color:rgba(251,248,243,0.5);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;}
.back-link:hover{color:var(--gold);}
.container{max-width:800px;margin:0 auto;padding:32px 20px;}
.inbox-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.unread-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,169,81,0.15);border:1px solid rgba(200,169,81,0.3);border-radius:20px;padding:6px 16px;}
.unread-count{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--gold);}
.unread-label{font-size:11px;color:rgba(251,248,243,0.5);letter-spacing:1px;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(251,248,243,0.6);cursor:pointer;transition:all 0.2s;}
.filter-btn.active,.filter-btn:hover{background:rgba(200,169,81,0.15);border-color:var(--gold);color:var(--gold);}
.email-item{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;overflow:hidden;}
.email-item.unread{border-left:3px solid var(--gold);}
.email-item:hover{border-color:rgba(200,169,81,0.2);background:rgba(16,21,32,0.95);}
.email-row{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--deep-navy);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--cream);flex-shrink:0;border:2px solid rgba(200,169,81,0.2);}
.email-meta{flex:1;min-width:0;}
.email-from{font-size:13px;font-weight:600;color:var(--cream);}
.email-subject{font-size:13px;color:rgba(251,248,243,0.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.email-subject.unread-subject{color:var(--cream);font-weight:600;}
.email-preview{font-size:12px;color:rgba(251,248,243,0.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.email-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.email-time{font-size:11px;color:rgba(251,248,243,0.35);}
.priority-dot{width:6px;height:6px;border-radius:50%;}
.priority-dot.high{background:var(--red);}
.priority-dot.normal{background:transparent;}
.label-pills{display:flex;gap:4px;flex-wrap:wrap;}
.pill{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;}
.pill-team{background:rgba(16,71,145,0.3);color:#6BA3FF;}
.pill-payments{background:rgba(224,82,82,0.2);color:var(--red);}
.pill-sales{background:rgba(200,169,81,0.2);color:var(--gold);}
.pill-essay{background:rgba(56,98,23,0.3);color:#7EC850;}
/* Expanded */
.email-expanded{display:none;padding:0 16px 16px 16px;border-top:1px solid rgba(255,255,255,0.06);}
.email-expanded.open{display:block;}
.email-full-preview{font-size:13px;color:rgba(251,248,243,0.6);line-height:1.6;margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;}
.action-row{display:flex;gap:8px;flex-wrap:wrap;}
.action-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(200,169,81,0.3);background:rgba(200,169,81,0.08);color:var(--gold);cursor:pointer;transition:all 0.2s;}
.action-btn:hover{background:rgba(200,169,81,0.2);}
.action-btn.secondary{border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(251,248,243,0.6);}
.action-btn.secondary:hover{background:rgba(255,255,255,0.08);color:var(--cream);}
.reply-input-wrap{margin-top:12px;display:none;}
.reply-input-wrap.open{display:flex;gap:8px;}
.reply-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(200,169,81,0.2);border-radius:8px;padding:8px 12px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.reply-input:focus{border-color:var(--gold);}
.send-btn{padding:8px 16px;border-radius:8px;background:var(--gold);color:var(--dark);font-size:12px;font-weight:700;border:none;cursor:pointer;}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(16,21,32,0.98);border:1px solid var(--gold);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--cream);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.toast.show{opacity:1;}
@media(max-width:600px){.email-row{gap:8px;}.action-row{flex-direction:column;}.reply-input-wrap.open{flex-direction:column;}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="header-logo">B&G</div>
    <div class="header-title">Inbox</div>
  </div>
  <a class="back-link" href="../">← Mission Control</a>
</div>
<div class="container">

<div class="inbox-header">
  <div class="unread-badge">
    <span class="unread-count" id="unread-count">0</span>
    <span class="unread-label">UNREAD</span>
  </div>
  <div style="font-size:12px;color:rgba(251,248,243,0.3);" id="gen-time"></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('unread',this)">Unread</button>
  <button class="filter-btn" onclick="setFilter('team',this)">Team</button>
  <button class="filter-btn" onclick="setFilter('payments',this)">Payments</button>
  <button class="filter-btn" onclick="setFilter('essay',this)">Leo</button>
</div>

<div id="email-list"></div>

</div>
<div class="toast" id="toast"></div>
<script>
var allEmails = [];
var currentFilter = 'all';

function relativeTime(dateStr) {
  var then = new Date(dateStr);
  var now = new Date();
  var diff = Math.floor((now - then) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function getInitials(name) {
  return name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
}

function getPillClass(label) {
  var map = {team:'pill-team',payments:'pill-payments',sales:'pill-sales',essay:'pill-essay'};
  return map[label] || 'pill-team';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderList();
}

function renderList() {
  var emails = allEmails.filter(function(e) {
    if (currentFilter === 'unread') return !e.read;
    if (currentFilter === 'all') return true;
    return e.labels.indexOf(currentFilter) !== -1;
  });
  var html = '';
  emails.forEach(function(em) {
    var unreadClass = em.read ? '' : ' unread';
    var subjClass = em.read ? '' : ' unread-subject';
    var pills = em.labels.map(function(l){return '<span class="pill '+getPillClass(l)+'">'+l+'</span>';}).join('');
    html += '<div class="email-item'+unreadClass+'" id="email-'+em.id+'" onclick="toggleEmail(\''+em.id+'\')">';
    html += '<div class="email-row">';
    html += '<div class="avatar">'+getInitials(em.from)+'</div>';
    html += '<div class="email-meta">';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    html += '<div class="email-from">'+em.from+'</div>';
    if(em.priority==='high') html += '<div class="priority-dot high" title="High priority"></div>';
    html += '</div>';
    html += '<div class="email-subject'+subjClass+'">'+em.subject+'</div>';
    html += '<div class="email-preview">'+em.preview+'</div>';
    html += '</div>';
    html += '<div class="email-right">';
    html += '<div class="email-time">'+relativeTime(em.date)+'</div>';
    html += '<div class="label-pills">'+pills+'</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="email-expanded" id="exp-'+em.id+'">';
    html += '<div class="email-full-preview">'+em.preview+'</div>';
    html += '<div class="action-row">';
    html += '<button class="action-btn" onclick="event.stopPropagation();openReply(\''+em.id+'\')">✍️ Reply via Leo</button>';
    html += '<button class="action-btn secondary" onclick="event.stopPropagation();markRead(\''+em.id+'\')">Mark Read</button>';
    html += '<button class="action-btn secondary" onclick="event.stopPropagation();showToast(\'Flagged for follow-up\')">🚩 Flag</button>';
    html += '</div>';
    html += '<div class="reply-input-wrap" id="reply-'+em.id+'">';
    html += '<input class="reply-input" placeholder="Quick reply... Leo will polish it" id="reply-text-'+em.id+'">';
    html += '<button class="send-btn" onclick="event.stopPropagation();sendReply(\''+em.id+'\')">Send</button>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
  });
  if (!html) html = '<p style="color:rgba(251,248,243,0.3);text-align:center;padding:40px;font-size:14px;">No emails matching filter</p>';
  document.getElementById('email-list').innerHTML = html;
}

function toggleEmail(id) {
  var exp = document.getElementById('exp-'+id);
  exp.classList.toggle('open');
}

function openReply(id) {
  var wrap = document.getElementById('reply-'+id);
  wrap.classList.toggle('open');
  if (wrap.classList.contains('open')) document.getElementById('reply-text-'+id).focus();
}

function sendReply(id) {
  var text = document.getElementById('reply-text-'+id).value.trim();
  if (!text) return;
  showToast('💙 Leo will send this on next sync');
  document.getElementById('reply-text-'+id).value = '';
  document.getElementById('reply-'+id).classList.remove('open');
}

function markRead(id) {
  var em = allEmails.find(function(e){return e.id===id;});
  if (em) { em.read = true; renderList(); updateUnread(); }
  showToast('Marked as read');
}

function updateUnread() {
  var count = allEmails.filter(function(e){return !e.read;}).length;
  document.getElementById('unread-count').textContent = count;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 3000);
}

fetch('../data/inbox.json').then(function(r){return r.json();}).then(function(d){
  allEmails = d.emails;
  document.getElementById('unread-count').textContent = d.unread_count;
  var g = new Date(d.generated);
  document.getElementById('gen-time').textContent = 'Updated ' + g.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:true}) + ' AEST';
  renderList();
}).catch(function(){ document.getElementById('email-list').innerHTML = '<p style="color:rgba(251,248,243,0.3);text-align:center;padding:40px;">Inbox data unavailable</p>'; });
</script>
</body>
</html>
