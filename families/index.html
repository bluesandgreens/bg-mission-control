<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Command — B&G Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#104791;--deep-navy:#0A2E5C;--gold:#C8A951;--green:#386217;--sage:#E8EFE2;--cream:#FBF8F3;--dark:#0A0E14;--dark2:#101520;--red:#E05252;--amber:#E8A030;--blue:#3B82F6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
a{color:inherit;text-decoration:none;}
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(10,14,20,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,169,81,0.25);}
.hdr-logo{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--navy);}
.hdr-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.back{color:rgba(251,248,243,0.45);font-size:13px;}
.back:hover{color:var(--gold);}
.wrap{max-width:1400px;margin:0 auto;padding:16px;}
.live-badge{font-size:10px;color:rgba(251,248,243,0.4);text-align:right;margin-bottom:12px;}
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:640px){.hero{grid-template-columns:repeat(2,1fr);}}
.hcard{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;text-align:center;}
.hcard.green{border-top:3px solid #4CAF50;}
.hcard.red{border-top:3px solid var(--red);}
.hcard.amber{border-top:3px solid var(--amber);}
.hcard.blue{border-top:3px solid var(--blue);}
.hval{font-family:'Archivo Black',sans-serif;font-size:28px;margin:4px 0 2px;}
.hval.green{color:#4CAF50;}
.hval.red{color:var(--red);}
.hval.amber{color:var(--amber);}
.hval.blue{color:var(--blue);}
.hlbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.hsub{font-size:10px;color:rgba(251,248,243,0.35);margin-top:2px;}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.search-box{flex:1;min-width:180px;background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;}
.search-box:focus{outline:none;border-color:rgba(200,169,81,0.4);}
.search-box::placeholder{color:rgba(251,248,243,0.3);}
select.filter{background:rgba(16,21,32,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 10px;color:var(--cream);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;}
select.filter:focus{outline:none;border-color:rgba(200,169,81,0.4);}
select.filter option{background:#101520;}
.count-badge{font-size:11px;color:rgba(251,248,243,0.45);white-space:nowrap;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(251,248,243,0.35);padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;user-select:none;white-space:nowrap;}
thead th:hover{color:var(--gold);}
thead th.sorted{color:var(--gold);}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.1s;}
tbody tr:hover{background:rgba(200,169,81,0.04);}
td{padding:9px 10px;vertical-align:middle;}
.row-indicator{width:4px;min-width:4px;border-radius:2px;}
.nm{font-weight:600;font-size:13px;}
.em{font-size:10px;color:rgba(251,248,243,0.35);}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.5px;white-space:nowrap;}
.badge.active-w1{background:rgba(76,175,80,0.15);color:#4CAF50;}
.badge.active-no-w1{background:rgba(232,160,48,0.15);color:var(--amber);}
.badge.past-due{background:rgba(224,82,82,0.15);color:var(--red);}
.badge.deposit{background:rgba(59,130,246,0.15);color:var(--blue);}
.tier-badge{font-size:9px;color:rgba(251,248,243,0.5);white-space:nowrap;}
.mentor-name{font-size:11px;color:rgba(251,248,243,0.65);}
.date-val{font-size:11px;color:rgba(251,248,243,0.6);}
.date-val.none{color:rgba(251,248,243,0.25);font-style:italic;}
.owner-badge{font-size:10px;font-weight:600;}
.hs-link{display:inline-block;font-size:10px;color:rgba(200,169,81,0.6);padding:3px 8px;border:1px solid rgba(200,169,81,0.2);border-radius:6px;transition:all 0.15s;}
.hs-link:hover{color:var(--gold);border-color:var(--gold);}
@media(max-width:768px){.hide-mobile{display:none;}}
.loading{text-align:center;padding:60px;color:rgba(251,248,243,0.4);}
</style>
</head>
<body>
<div class="hdr">
  <a class="hdr-logo" href="../index.html">B&G</a>
  <span class="hdr-title">Family Command</span>
  <a class="back" href="../index.html">← MC</a>
</div>
<div class="wrap">
  <div class="live-badge" id="live-badge">📡 Live · loading...</div>

  <div class="hero" id="hero">
    <div class="hcard green"><div class="hval green" id="h-active">—</div><div class="hlbl">Active Families</div><div class="hsub">Boys being mentored</div></div>
    <div class="hcard red"><div class="hval red" id="h-pastdue">—</div><div class="hlbl">Families at Risk</div><div class="hsub">Payment past due</div></div>
    <div class="hcard amber"><div class="hval amber" id="h-nw1">—</div><div class="hlbl">Awaiting W1</div><div class="hsub">Active, not started yet</div></div>
    <div class="hcard blue"><div class="hval blue" id="h-deposit">—</div><div class="hlbl">New Deposits</div><div class="hsub">Families waiting to start</div></div>
  </div>

  <div class="controls">
    <input class="search-box" id="search" type="text" placeholder="🔍 Search family or email…" oninput="renderTable()">
    <select class="filter" id="f-status" onchange="renderTable()">
      <option value="">All statuses</option>
      <option value="active">Active</option>
      <option value="past_due">Past Due</option>
      <option value="deposit">New Deposit</option>
    </select>
    <select class="filter" id="f-tier" onchange="renderTable()">
      <option value="">All tiers</option>
      <option value="Big Brother">Big Brother</option>
      <option value="Lighthouse">Lighthouse</option>
    </select>
    <select class="filter" id="f-owner" onchange="renderTable()">
      <option value="">All owners</option>
      <option value="Harry">Harry</option>
      <option value="Rye">Rye</option>
      <option value="Brodie">Brodie</option>
      <option value="Norri">Norri</option>
      <option value="Elliot">Elliot</option>
    </select>
    <span class="count-badge" id="count-badge"></span>
  </div>

  <div class="tbl-wrap">
    <table id="fam-table">
      <thead>
        <tr>
          <th style="width:4px"></th>
          <th onclick="sortBy('name')">Name / Email</th>
          <th onclick="sortBy('status')">Status</th>
          <th class="hide-mobile" onclick="sortBy('tier')">Tier</th>
          <th class="hide-mobile" onclick="sortBy('mentor')">Mentor</th>
          <th onclick="sortBy('w1_date')">W1 Date</th>
          <th class="hide-mobile" onclick="sortBy('amount')">Payment</th>
          <th class="hide-mobile" onclick="sortBy('owner')">Owner</th>
          <th>HubSpot</th>
        </tr>
      </thead>
      <tbody id="fam-tbody">
        <tr><td colspan="9" class="loading">Loading families…</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
let allFamilies = [];
let sortKey = 'name';
let sortDir = 1;

function rowColor(f) {
  if (f.stripe_status === 'past_due') return '#E05252';
  if (f.stripe_status === 'active' && f.w1_date) return '#4CAF50';
  if (f.stripe_status === 'active' && !f.w1_date) return '#E8A030';
  return '#3B82F6';
}

function rowBadge(f) {
  if (f.stripe_status === 'past_due') return '<span class="badge past-due">⚠️ At Risk</span>';
  if (f.stripe_status === 'active' && f.w1_date) return '<span class="badge active-w1">✅ Active</span>';
  if (f.stripe_status === 'active' && !f.w1_date) return '<span class="badge active-no-w1">⏳ Awaiting W1</span>';
  return '<span class="badge deposit">💰 New Deposit</span>';
}

function fmtDate(d) {
  if (!d) return '<span class="date-val none">—</span>';
  const dt = new Date(d);
  return `<span class="date-val">${dt.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'2-digit'})}</span>`;
}

function tierShort(t) {
  if (!t) return '';
  if (t.toLowerCase().includes('big')) return 'Big Bro';
  if (t.toLowerCase().includes('light')) return 'Lighthouse';
  return t.slice(0, 12);
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const fStatus = document.getElementById('f-status').value;
  const fTier = document.getElementById('f-tier').value;
  const fOwner = document.getElementById('f-owner').value;

  let rows = allFamilies.filter(f => {
    if (q && !f.name.toLowerCase().includes(q) && !(f.email||'').toLowerCase().includes(q)) return false;
    if (fStatus === 'active' && f.stripe_status !== 'active') return false;
    if (fStatus === 'past_due' && f.stripe_status !== 'past_due') return false;
    if (fStatus === 'deposit' && f.stripe_status !== null) return false;
    if (fTier && !(f.tier||'').toLowerCase().includes(fTier.toLowerCase())) return false;
    if (fOwner && f.owner !== fOwner) return false;
    return true;
  });

  rows.sort((a, b) => {
    let av = a[sortKey] || '';
    let bv = b[sortKey] || '';
    if (sortKey === 'amount') { av = parseFloat(av)||0; bv = parseFloat(bv)||0; }
    else { av = String(av).toLowerCase(); bv = String(bv).toLowerCase(); }
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  document.getElementById('count-badge').textContent = `${rows.length} of ${allFamilies.length} families`;

  const tbody = document.getElementById('fam-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="loading">No families match filters</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(f => {
    const color = rowColor(f);
    const badge = rowBadge(f);
    const tier = tierShort(f.tier);
    const mentor = f.mentor ? `<span class="mentor-name">${f.mentor}</span>` : '<span class="date-val none">—</span>';
    const amount = f.amount ? `$${parseFloat(f.amount).toLocaleString()}` : '—';
    const owner = f.owner || '—';
    return `<tr>
      <td><div class="row-indicator" style="background:${color};height:32px;"></div></td>
      <td><div class="nm">${escHtml(f.name)}</div><div class="em">${escHtml(f.email||'')}</div></td>
      <td>${badge}</td>
      <td class="hide-mobile"><span class="tier-badge">${escHtml(tier)}</span></td>
      <td class="hide-mobile">${mentor}</td>
      <td>${fmtDate(f.w1_date)}</td>
      <td class="hide-mobile">${escHtml(amount)}</td>
      <td class="hide-mobile"><span class="owner-badge">${escHtml(owner)}</span></td>
      <td>${f.hs_url ? `<a class="hs-link" href="${f.hs_url}" target="_blank" rel="noopener">Open →</a>` : '—'}</td>
    </tr>`;
  }).join('');
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  renderTable();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function init() {
  try {
    const r = await fetch('../data/families.json');
    const data = await r.json();
    allFamilies = data.families || [];

    // Hero counts
    const active = allFamilies.filter(f => f.stripe_status === 'active');
    const pastDue = allFamilies.filter(f => f.stripe_status === 'past_due');
    const awaitingW1 = active.filter(f => !f.w1_date);
    const deposits = allFamilies.filter(f => !f.stripe_status);

    document.getElementById('h-active').textContent = active.length;
    document.getElementById('h-pastdue').textContent = pastDue.length;
    document.getElementById('h-nw1').textContent = awaitingW1.length;
    document.getElementById('h-deposit').textContent = deposits.length;

    const gen = new Date(data.generated);
    document.getElementById('live-badge').textContent = `📡 Live · ${gen.toLocaleString('en-AU',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'})}`;

    renderTable();
  } catch(e) {
    document.getElementById('fam-tbody').innerHTML = `<tr><td colspan="9" class="loading">Error loading data: ${e.message}</td></tr>`;
  }
}

init();
</script>
</body>
</html>
